                          <input type="number" value={layer.c} onChange={(e) => updateLayer(layer.id, 'c', e.target.value)} className="w-10 text-right border rounded px-1 py-0.5" />
                        </div>
                        <div className="flex justify-between items-center">
                          <label className="text-slate-600">φ (°):</label>
                          <input type="number" value={layer.phi} onChange={(e) => updateLayer(layer.id, 'phi', e.target.value)} className="w-10 text-right border rounded px-1 py-0.5" />
                        </div>
                        <div className="flex justify-between items-center">
                          <label className="text-slate-600">γ:</label>
                          <input type="number" value={layer.gammaDry} onChange={(e) => updateLayer(layer.id, 'gammaDry', e.target.value)} className="w-10 text-right border rounded px-1 py-0.5" />
                        </div>
                        <div className="flex justify-between items-center">
                          <label className="text-slate-600">γ<sub>sat</sub>:</label>
                          <input type="number" value={layer.gammaSat} onChange={(e) => updateLayer(layer.id, 'gammaSat', e.target.value)} className="w-10 text-right border rounded px-1 py-0.5" />
                        </div>
                        <div className="flex justify-between items-center mt-1 pt-1 border-t border-slate-200">
                          <span className="text-slate-600">K<sub>a</sub>: <span className="font-mono font-bold text-red-600">{ka_val.toFixed(2)}</span></span>
                          <span className="text-slate-600">K<sub>p</sub>: <span className="font-mono font-bold text-teal-600">{kp_val.toFixed(2)}</span></span>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>

          <div className="lg:col-span-10 flex flex-col gap-6">
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-row items-start relative gap-4">
              
              {/* ΚΑΘΕΤΑ ΚΟΥΜΠΙΑ (ΤΕΡΜΑ ΑΡΙΣΤΕΡΑ) */}
              <div className="flex flex-col gap-2 shrink-0 pt-8 border-r border-slate-100 pr-4">
                <button onClick={() => setDisplayMode('stresses')} className={`px-4 py-3 rounded-xl text-sm font-bold text-left transition-all ${displayMode === 'stresses' ? 'bg-blue-600 text-white shadow-md' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>
                  Κατανομές Τάσεων
                </button>
                <button onClick={() => setDisplayMode('forces')} className={`px-4 py-3 rounded-xl text-sm font-bold text-left transition-all ${displayMode === 'forces' ? 'bg-blue-600 text-white shadow-md' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>
                  Συνολικές Δυνάμεις
                </button>
                <button onClick={() => setDisplayMode('resultants')} className={`px-4 py-3 rounded-xl text-sm font-bold text-left transition-all ${displayMode === 'resultants' ? 'bg-blue-600 text-white shadow-md' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>
                  Συνισταμένες
                </button>
              </div>
              
              {/* ΓΡΑΦΗΜΑ (ΔΕΞΙΑ) */}
              <div className="flex-1 overflow-x-auto relative bg-[#fafaf9] rounded-xl border border-slate-200 p-4">
                
                {/* ΣΤΑΘΕΡΟ ΠΕΔΙΟ ΒΑΘΟΥΣ CURSOR ΜΕΣΑ ΣΤΟ ΔΙΑΓΡΑΜΜΑ */}
                <div className="absolute top-4 right-4 bg-slate-800/90 backdrop-blur text-white px-3 py-1.5 rounded-lg text-xs font-bold shadow-sm z-10 flex items-center gap-2 border border-slate-600">
                  <svg className="w-3.5 h-3.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"></path></svg>
                  Βάθος (z): {hoverZ !== null ? <span className="text-amber-400">{hoverZ.toFixed(1)} m</span> : <span className="text-slate-400">-</span>}
                </div>

                <div className="min-w-[800px] w-full mt-6">
                  <svg viewBox={`0 -30 ${totalSvgW} ${svgH + 60}`} className="w-full h-auto max-h-[550px]" style={{ minHeight: '450px' }}>
                    <defs>
                      <marker id="arr-water" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" /></marker>
                      <marker id="arr-pass" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#0d9488" /></marker>
                      <marker id="arr-vert" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed" /></marker>
                      <marker id="arr-act" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" /></marker>
                      <marker id="arr-grey" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8" /></marker>
                      <marker id="arr-q" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706" /></marker>
                      <marker id="arr-res-act" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#b91c1c" /></marker>
                      <marker id="arr-res-pass" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#0f766e" /></marker>
                    </defs>

                    <g transform={`translate(0, 0)`}>
                      <text x={wWater - 5} y="-15" fontSize="12" fill="#3b82f6" fontWeight="bold" textAnchor="end">u</text>
                      <line x1={wWater} y1="0" x2={wWater} y2={svgH} stroke="#cbd5e1" strokeWidth="2" />
                      {waterForceL.map((seg, i) => (
                        <g key={`wl-${i}`}>
                          <polygon points={`${wWater},${seg.zTop*40} ${wWater - seg.valTop*scaleU},${seg.zTop*40} ${wWater - seg.valBot*scaleU},${seg.zBot*40} ${wWater},${seg.zBot*40}`} fill="rgba(59,130,246,0.15)" stroke="#3b82f6" strokeWidth="1.5" opacity={displayMode === 'stresses' ? 1 : 0.4} />
                          {displayMode === 'stresses' && renderArrows(seg, wWater, scaleU, "#3b82f6", "arr-water", false)}
                          {displayMode === 'stresses' && renderLabels(seg, wWater, scaleU, false)}
                        </g>
                      ))}
                      {displayMode === 'forces' && renderForcesVisuals(fWL, wWater, "#3b82f6", "arr-water", false)}
                    </g>

                    <g transform={`translate(${wWater}, 0)`}>
                      <text x={wEarthL - 5} y="-15" fontSize="12" fill="#0d9488" fontWeight="bold" textAnchor="end">Οριζόντιες Παθητικές σ'p</text>
                      <line x1={wEarthL} y1={excavationH*40} x2={wEarthL} y2={svgH} stroke="#cbd5e1" strokeWidth="2" />
                      {segmentsL.map((seg, i) => (
                        <g key={`pl-${i}`}>
                          <polygon points={`${wEarthL},${seg.zTop*40} ${wEarthL - seg.valTop*scaleSp},${seg.zTop*40} ${wEarthL - seg.valBot*scaleSp},${seg.zBot*40} ${wEarthL},${seg.zBot*40}`} fill="rgba(13,148,136,0.2)" stroke="#0d9488" strokeWidth="1.5" opacity={displayMode === 'stresses' ? 1 : 0.4} />
                          {displayMode === 'forces' && !seg.isNeg && Math.min(seg.valTop, seg.valBot) > 0.05 && Math.abs(seg.valTop - seg.valBot) > 0.05 && (
                            <line x1={wEarthL - Math.min(seg.valTop, seg.valBot)*scaleSp} y1={seg.zTop*40} x2={wEarthL - Math.min(seg.valTop, seg.valBot)*scaleSp} y2={seg.zBot*40} stroke="#0d9488" strokeWidth="1.5" strokeDasharray="3 3" opacity="0.6"/>
                          )}
                          {displayMode === 'stresses' && renderArrows(seg, wEarthL, scaleSp, "#0d9488", "arr-pass", false)}
                          {displayMode === 'stresses' && renderLabels(seg, wEarthL, scaleSp, false)}
                        </g>
                      ))}
                      {displayMode === 'forces' && renderForcesVisuals(fPL, wEarthL, "#0d9488", "arr-pass", false)}
                    </g>

                    <g transform={`translate(${wWater + wEarthL}, 0)`}>
                      <text x={wVertL - 5} y="-15" fontSize="12" fill="#7c3aed" fontWeight="bold" textAnchor="end">σ'v</text>
                      <line x1={wVertL} y1={excavationH*40} x2={wVertL} y2={svgH} stroke="#cbd5e1" strokeWidth="2" />
                      {segmentsVertL.map((seg, i) => (
                        <g key={`vl-${i}`}>
                          <polygon points={`${wVertL},${seg.zTop*40} ${wVertL - seg.valTop*scaleSv},${seg.zTop*40} ${wVertL - seg.valBot*scaleSv},${seg.zBot*40} ${wVertL},${seg.zBot*40}`} fill="rgba(124,58,237,0.15)" stroke="#7c3aed" strokeWidth="1.5" opacity={displayMode === 'stresses' ? 1 : 0.2} />
                          {displayMode === 'stresses' && renderArrows(seg, wVertL, scaleSv, "#7c3aed", "arr-vert", false)}
                          {displayMode === 'stresses' && renderLabels(seg, wVertL, scaleSv, false)}
                        </g>
                      ))}
                    </g>

                    <g transform={`translate(${wWater + wEarthL + wVertL}, 0)`} 
                        onMouseMove={handleSvgMove} onMouseLeave={() => setHoverZ(null)} onClick={handleSvgClick} 
                        className="cursor-crosshair"
                    >
                      {qLoad > 0 && (
                        <g transform={`translate(${wCenter/2}, -15)`}>
                          <rect x="0" y="-10" width={wCenter/2} height="10" fill="#fef3c7" opacity="0.8"/>
                          <line x1="0" y1="0" x2={wCenter/2} y2="0" stroke="#d97706" strokeWidth="2"/>
                          {[10, 30, 50, 70].map(x => (
                            <line key={x} x1={x} y1="-10" x2={x} y2="0" stroke="#d97706" strokeWidth="1.5" markerEnd="url(#arr-q)"/>
                          ))}
                          <text x={wCenter/4} y="-15" fontSize="10" fill="#d97706" fontWeight="bold" textAnchor="middle">q={qLoad}kPa</text>
                        </g>
                      )}

                      {layers.map((l, i) => {
                        const nextZ = layers[i+1]?.z || totalH;
                        if (nextZ <= l.z) return null;
                        const h = (nextZ - l.z) * 40;
                        return (
                          <g key={`soil-${i}`}>
                            <rect x={wCenter/2} y={l.z * 40} width={wCenter/2} height={h} fill={l.color} opacity="0.3" />
                            {nextZ > excavationH && (
                              <rect x="0" y={Math.max(l.z, excavationH) * 40} width={wCenter/2} height={(nextZ - Math.max(l.z, excavationH)) * 40} fill={l.color} opacity="0.3" />
                            )}
                          </g>
                        );
                      })}
                      
                      <line x1="0" y1={excavationH*40} x2={wCenter/2} y2={excavationH*40} stroke="#b45309" strokeWidth="2.5"/>
                      <line x1={wCenter/2} y1="0" x2={wCenter} y2="0" stroke="#b45309" strokeWidth="2.5"/>
                      
                      <rect x={wCenter/2 - 3} y="0" width="6" height={svgH} fill="#475569"/>

                      <line x1={wCenter/2} y1={hwActive*40} x2={wCenter} y2={hwActive*40} stroke="#3b82f6" strokeWidth="2.5" strokeDasharray="4 3"/>
                      <line x1="0" y1={hwPassive*40} x2={wCenter/2} y2={hwPassive*40} stroke="#0d9488" strokeWidth="2.5" strokeDasharray="4 3"/>

                      {layers.map((l, i) => l.z > 0 && (
                        <line key={`cl-${i}`} x1="0" y1={l.z*40} x2={wCenter} y2={l.z*40} stroke="#ca8a04" strokeWidth="1" strokeDasharray="2 2" opacity="0.5"/>
                      ))}

                      {zeroDepthsR.map(z => (
                        <g key={`z0-${z}`}>
                          <rect x={wCenter/2 + 2} y={z*40 - 7} width="35" height="14" rx="3" fill="#f97316" />
                          <text x={wCenter/2 + 19} y={z*40 + 3} fontSize="9" fill="#fff" fontWeight="bold" textAnchor="middle">z0={z.toFixed(1)}</text>
                        </g>
                      ))}

                      {(() => {
                        let wallLabels = new Set([0, excavationH, hwActive, hwPassive, ...layers.map(l => l.z)]);
                        let uniqueZ = Array.from(wallLabels).filter(z => z >= 0 && z <= totalH).sort((a,b)=>a-b);
                        return uniqueZ.map((z, i) => (
                          <g key={`wlbl-${i}`}>
                            <rect x={wCenter/2 - 16} y={z*40 - 8} width="32" height="16" rx="4" fill="#1e293b" />
                            <text x={wCenter/2} y={z*40 + 3} fontSize="9" fill="#f8fafc" fontWeight="bold" textAnchor="middle">{z.toFixed(1)}m</text>
                          </g>
                        ));
                      })()}

                      <g transform={`translate(${wCenter/2}, ${svgH})`}>
                        <polygon points="0,0 -10,12 10,12" fill="#1e293b" />
                        <circle cx="0" cy="0" r="4" fill="#ef4444" />
                        <text x="0" y="26" fontSize="11" fill="#1e293b" fontWeight="bold" textAnchor="middle">Σημείο Ισορροπίας (z={totalH}m)</text>
                      </g>

                      {displayMode === 'resultants' && Fa_total > 0 && (
                        <g>
                          <line x1={wCenter/2 + 75} y1={(totalH - yA) * 40} x2={wCenter/2 + 3} y2={(totalH - yA) * 40} stroke="#b91c1c" strokeWidth="3.5" markerEnd="url(#arr-res-act)" />
                          <text x={wCenter/2 + 82} y={(totalH - yA) * 40 - 6} fontSize="12" fill="#b91c1c" fontWeight="bold">E_a = {Fa_total.toFixed(1)} kN</text>
                          <text x={wCenter/2 + 82} y={(totalH - yA) * 40 + 10} fontSize="10" fill="#b91c1c">y = {yA.toFixed(2)}m (από πόδα)</text>
                        </g>
                      )}

                      {displayMode === 'resultants' && Fp_total > 0 && (
                        <g>
                          <line x1={wCenter/2 - 75} y1={(totalH - yP) * 40} x2={wCenter/2 - 3} y2={(totalH - yP) * 40} stroke="#0f766e" strokeWidth="3.5" markerEnd="url(#arr-res-pass)" />
                          <text x={wCenter/2 - 82} y={(totalH - yP) * 40 - 6} fontSize="12" fill="#0f766e" fontWeight="bold" textAnchor="end">E_p = {Fp_total.toFixed(1)} kN</text>
                          <text x={wCenter/2 - 82} y={(totalH - yP) * 40 + 10} fontSize="10" fill="#0f766e" textAnchor="end">y = {yP.toFixed(2)}m (από πόδα)</text>
                        </g>
                      )}
                    </g>

                    <g transform={`translate(${wWater + wEarthL + wVertL + wCenter}, 0)`}>
                      <text x="5" y="-15" fontSize="12" fill="#7c3aed" fontWeight="bold" textAnchor="start">σ'v</text>
                      <line x1="0" y1="0" x2="0" y2={svgH} stroke="#cbd5e1" strokeWidth="2" />
                      {segmentsVertR.map((seg, i) => (
                        <g key={`vr-${i}`}>
                          <polygon points={`0,${seg.zTop*40} ${seg.valTop*scaleSv},${seg.zTop*40} ${seg.valBot*scaleSv},${seg.zBot*40} 0,${seg.zBot*40}`} fill="rgba(124,58,237,0.15)" stroke="#7c3aed" strokeWidth="1.5" opacity={displayMode === 'stresses' ? 1 : 0.2} />
                          {displayMode === 'stresses' && renderArrows(seg, 0, scaleSv, "#7c3aed", "arr-vert", true)}
                          {displayMode === 'stresses' && renderLabels(seg, 0, scaleSv, true)}
                        </g>
                      ))}
                    </g>

                    <g transform={`translate(${wWater + wEarthL + wVertL + wCenter + wVertR}, 0)`}>
                      <text x="5" y="-15" fontSize="12" fill="#ef4444" fontWeight="bold" textAnchor="start">Οριζόντιες Ενεργές σ'h</text>
                      <line x1="0" y1="0" x2="0" y2={svgH} stroke="#cbd5e1" strokeWidth="2" />
                      {segmentsR.map((seg, i) => {
                        if (displayMode === 'forces' && seg.isNeg) return null; 
                        return (
                          <g key={`ar-${i}`}>
                            <polygon 
                              points={`0,${seg.zTop*40} ${seg.valTop*scaleSa},${seg.zTop*40} ${seg.valBot*scaleSa},${seg.zBot*40} 0,${seg.zBot*40}`} 
                              fill={seg.isNeg ? "rgba(148,163,184,0.3)" : "rgba(239,68,68,0.2)"} 
                              stroke={seg.isNeg ? "#94a3b8" : "#ef4444"} 
                              strokeWidth="1.5" 
                              opacity={displayMode === 'stresses' ? 1 : 0.4} 
                            />
                            {displayMode === 'forces' && !seg.isNeg && Math.min(seg.valTop, seg.valBot) > 0.05 && Math.abs(seg.valTop - seg.valBot) > 0.05 && (
                              <line x1={Math.min(seg.valTop, seg.valBot)*scaleSa} y1={seg.zTop*40} x2={Math.min(seg.valTop, seg.valBot)*scaleSa} y2={seg.zBot*40} stroke="#ef4444" strokeWidth="1.5" strokeDasharray="3 3" opacity="0.6"/>
                            )}
                            {displayMode === 'stresses' && renderArrows(seg, 0, scaleSa, seg.isNeg ? "#94a3b8" : "#ef4444", seg.isNeg ? "arr-grey" : "arr-act", true)}
                            {displayMode === 'stresses' && renderLabels(seg, 0, scaleSa, true)}
                          </g>
                        );
                      })}
                      {displayMode === 'forces' && renderForcesVisuals(fAR, 0, "#ef4444", "arr-act", true)}
                    </g>

                    <g transform={`translate(${wWater + wEarthL + wVertL + wCenter + wVertR + wEarthR}, 0)`}>
                      <text x="5" y="-15" fontSize="12" fill="#d97706" fontWeight="bold" textAnchor="start">Λόγω q</text>
                      <line x1="0" y1="0" x2="0" y2={svgH} stroke="#cbd5e1" strokeWidth="2" />
                      {segmentsQ.map((seg, i) => (
                        <g key={`q-${i}`}>
                          <polygon points={`0,${seg.zTop*40} ${seg.valTop*scaleQ},${seg.zTop*40} ${seg.valBot*scaleQ},${seg.zBot*40} 0,${seg.zBot*40}`} fill="rgba(245,158,11,0.15)" stroke="#d97706" strokeWidth="1.5" opacity={displayMode === 'stresses' ? 1 : 0.4} />
                          {displayMode === 'stresses' && renderArrows(seg, 0, scaleQ, "#d97706", "arr-q", true)}
                          {displayMode === 'stresses' && renderLabels(seg, 0, scaleQ, true)}
                        </g>
                      ))}
                      {displayMode === 'forces' && renderForcesVisuals(fQ, 0, "#d97706", "arr-q", true)}
                    </g>

                    <g transform={`translate(${wWater + wEarthL + wVertL + wCenter + wVertR + wEarthR + wQ}, 0)`}>
                      <text x="5" y="-15" fontSize="12" fill="#3b82f6" fontWeight="bold" textAnchor="start">u</text>
                      <line x1="0" y1="0" x2="0" y2={svgH} stroke="#cbd5e1" strokeWidth="2" />
                      {waterForceR.map((seg, i) => (
                        <g key={`wr-${i}`}>
                          <polygon points={`0,${seg.zTop*40} ${seg.valTop*scaleU},${seg.zTop*40} ${seg.valBot*scaleU},${seg.zBot*40} 0,${seg.zBot*40}`} fill="rgba(59,130,246,0.15)" stroke="#3b82f6" strokeWidth="1.5" opacity={displayMode === 'stresses' ? 1 : 0.4} />
                          {displayMode === 'stresses' && renderArrows(seg, 0, scaleU, "#3b82f6", "arr-water", true)}
                          {displayMode === 'stresses' && renderLabels(seg, 0, scaleU, true)}
                        </g>
                      ))}
                      {displayMode === 'forces' && renderForcesVisuals(fWR, 0, "#3b82f6", "arr-water", true)}
                    </g>

                  </svg>
                </div>
              </div>
            </div>

            <div className="grid grid-cols-1 xl:grid-cols-3 gap-6">
              <div className="xl:col-span-2 bg-white p-5 rounded-xl shadow-sm border border-slate-200 overflow-x-auto">
                <h3 className="font-bold text-slate-800 mb-4 border-b pb-2">Αναλυτικός Πίνακας Δυνάμεων & Τάσεων</h3>
                <table className="w-full text-left text-xs text-slate-600">
                  <thead className="bg-slate-50 border-b border-slate-200">
                    <tr>
                      <th className="p-2 font-bold">A/A</th>
                      <th className="p-2 font-bold">Περιοχή</th>
                      <th className="p-2 font-bold">z (m)</th>
                      <th className="p-2 font-bold">Σχήμα</th>
                      <th className="p-2 font-bold text-right">Τάση Πάνω</th>
                      <th className="p-2 font-bold text-right">Τάση Κάτω</th>
                      <th className="p-2 font-bold text-right text-slate-800">Δύναμη (kN/m)</th>
                      <th className="p-2 font-bold text-right">Μοχλός (m)</th>
                      <th className="p-2 font-bold text-right text-slate-800">Ροπή (kNm/m)</th>
                    </tr>
                  </thead>
                  <tbody>
                    {allForcesCombined.length === 0 ? (
                      <tr><td colSpan="9" className="p-4 text-center text-slate-400">Δεν υπάρχουν δυνάμεις</td></tr>
                    ) : (
                      allForcesCombined.map(f => (
                        <tr key={f.id} className="border-b border-slate-100 hover:bg-slate-50 transition-colors">
                          <td className="p-2 font-bold"><span className="bg-slate-200 text-slate-700 px-2 py-0.5 rounded-full">{f.id}</span></td>
                          <td className={`p-2 font-bold ${f.group.includes('Ενεργητική') ? 'text-red-600' : f.group.includes('Παθητική') ? 'text-teal-600' : f.group.includes('Φορτίο') ? 'text-amber-600' : 'text-blue-600'}`}>{f.group}</td>
                          <td className="p-2">{f.zTop.toFixed(2)} - {f.zBot.toFixed(2)}</td>
                          <td className="p-2">{f.type === 'rect' ? 'Ορθογώνιο' : 'Τρίγωνο'}</td>
                          <td className="p-2 text-right">{f.vTop.toFixed(1)}</td>
                          <td className="p-2 text-right">{f.vBot.toFixed(1)}</td>
                          <td className="p-2 text-right font-bold text-slate-800">{f.F.toFixed(1)}</td>
                          <td className="p-2 text-right">{f.leverArm.toFixed(2)}</td>
                          <td className="p-2 text-right font-bold text-slate-800">{(f.F * f.leverArm).toFixed(1)}</td>
                        </tr>
                      ))
                    )}
                  </tbody>
                </table>
              </div>

              <div className="bg-slate-800 text-white p-5 rounded-xl shadow-sm flex flex-col justify-center">
                <h3 className="font-bold text-slate-200 mb-4 border-b border-slate-700 pb-2">Στατικός Έλεγχος Έναντι Ανατροπής</h3>
                <div className="space-y-4 text-sm">
                  <div className="flex justify-between items-center bg-slate-700/50 p-3 rounded-lg">
                    <span className="text-slate-300">Συνολική Ροπή Ώθησης (M<sub>A</sub>)</span>
                    <span className="font-mono font-bold text-red-400 text-lg">{MA_total.toFixed(1)}</span>
                  </div>
                  <div className="flex justify-between items-center bg-slate-700/50 p-3 rounded-lg">
                    <span className="text-slate-300">Συνολική Ροπή Αντίστασης (M<sub>P</sub>)</span>
                    <span className="font-mono font-bold text-teal-400 text-lg">{MP_total.toFixed(1)}</span>
                  </div>
                  
                  <div className={`mt-6 p-4 rounded-xl border-2 flex flex-col items-center justify-center text-center ${FS_overturning >= 1.5 ? 'border-green-500 bg-green-500/10' : FS_overturning >= 1 ? 'border-amber-500 bg-amber-500/10' : 'border-red-500 bg-red-500/10'}`}>
                    <div className="text-slate-300 mb-1">Συντελεστής Ασφαλείας (F.S.)</div>
                    <div className="font-mono text-3xl font-bold mb-1">
                      {FS_overturning === Infinity ? "∞" : FS_overturning.toFixed(2)}
                    </div>
                    <div className="text-xs font-medium">
                      {FS_overturning >= 1.5 ? (
                        <span className="text-green-400">Επαρκής Ασφάλεια (F.S. ≥ 1.5)</span>
                      ) : FS_overturning >= 1 ? (
                        <span className="text-amber-400">Οριακή Ισορροπία (1.0 ≤ F.S. &lt; 1.5)</span>
                      ) : (
                        <span className="text-red-400">Κίνδυνος Ανατροπής (F.S. &lt; 1.0)</span>
                      )}
                    </div>
                  </div>
                </div>
              </div>
            </div>

          </div>
        </div>
      );
    };

    // --- MAIN APP ---
    function App() {
      const [activeTab, setActiveTab] = useState('mohr');

      return (
        <div className="min-h-screen max-w-[1500px] mx-auto p-6">
          <Header />
          <TabNavigation activeTab={activeTab} setActiveTab={setActiveTab} />
          
          <main>
            {activeTab === 'mohr' && <MohrCircleTab />}
            {activeTab === 'coulomb' && <CoulombTab />}
            {activeTab === 'distributions' && <EarthPressureTab />}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
