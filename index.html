<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Υπολογισμός Εδαφικών Ωθήσεων - Π. Πελέκης</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          animation: { fadeIn: 'fadeIn 0.4s ease-in-out' },
          keyframes: { fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } } }
        }
      }
    }
  </script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans selection:bg-blue-100 m-0 p-0">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;

    const Fraction = ({ num, den }) => (
      <span className="inline-flex flex-col items-center justify-center align-middle mx-1 text-sm font-serif">
        <span className="border-b border-slate-700 pb-[1px] px-1">{num}</span>
        <span className="pt-[1px] px-1">{den}</span>
      </span>
    );

    const Header = () => (
      <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex flex-col md:flex-row md:items-center justify-between gap-6 mb-6">
        <div className="flex items-center gap-4 shrink-0 border-b md:border-b-0 pb-4 md:pb-0 border-slate-100">
          <img src="https://www.upatras.gr/wp-content/uploads/upatras-2.jpg" alt="Πανεπιστήμιο Πατρών" className="h-16 object-contain" />
          <div className="text-left">
            <div className="font-bold text-slate-700 text-sm">Τμήμα Πολιτικών Μηχανικών</div>
            <div className="text-slate-800 font-bold">Π. Κ. Πελέκης</div>
            <div className="text-xs text-slate-500">Αναπληρωτής Καθηγητής</div>
          </div>
        </div>
        <div className="flex-1 md:text-right">
          <h1 className="text-3xl font-bold text-slate-800 mb-1">Υπολογισμός Εδαφικών Ωθήσεων</h1>
          <h2 className="text-lg text-slate-700 font-medium">Ενεργητική και Παθητική Ώθηση Γαιών</h2>
        </div>
      </header>
    );

    const TabNavigation = ({ activeTab, setActiveTab }) => {
      const tabs = [
        { id: 'mohr', label: '1. Κύκλοι Mohr (Rankine)' },
        { id: 'coulomb', label: '2. Θεωρία Coulomb' },
        { id: 'distributions', label: '3. Κατανομές Ωθήσεων' }
      ];

      return (
        <div className="flex flex-wrap gap-2 mb-6 bg-slate-200/50 p-1.5 rounded-xl border border-slate-200 shadow-inner">
          {tabs.map(tab => (
            <button
              key={tab.id}
              onClick={() => setActiveTab(tab.id)}
              className={`flex-1 py-3 px-4 rounded-lg font-bold text-sm transition-all duration-200 ${
                activeTab === tab.id 
                  ? 'bg-white text-blue-700 shadow-sm border border-slate-200' 
                  : 'text-slate-600 hover:text-slate-900 hover:bg-slate-200/50'
              }`}
            >
              {tab.label}
            </button>
          ))}
        </div>
      );
    };

    // --- TAB 1: MOHR CIRCLE (Rankine) ---
    const MohrCircleTab = () => {
      const [phi, setPhi] = useState(30);
      const [c, setC] = useState(0);
      const [stateParam, setStateParam] = useState(0);
      const [zoom, setZoom] = useState(1);
      const [showProof, setShowProof] = useState(false);
      const [showPoleExplanation, setShowPoleExplanation] = useState(false);
      const sigmaV = 100;

      const calculations = useMemo(() => {
        const phiRad = (phi * Math.PI) / 180;
        const K0 = 1 - Math.sin(phiRad);
        const Ka = Math.pow(Math.tan((45 - phi / 2) * (Math.PI / 180)), 2);
        const Kp = Math.pow(Math.tan((45 + phi / 2) * (Math.PI / 180)), 2);

        const sqrtKa = Math.sqrt(Ka);
        const sqrtKp = Math.sqrt(Kp);

        const sigmaH0 = K0 * sigmaV;
        const sigmaHa = Ka * sigmaV - 2 * c * sqrtKa;
        const sigmaHp = Kp * sigmaV + 2 * c * sqrtKp;

        let sigmaH = sigmaH0;
        if (stateParam < 0) sigmaH = sigmaH0 - Math.abs(stateParam) * (sigmaH0 - sigmaHa);
        else if (stateParam > 0) sigmaH = sigmaH0 + stateParam * (sigmaHp - sigmaH0);

        const center = (sigmaV + sigmaH) / 2;
        const radius = Math.abs(sigmaV - sigmaH) / 2;
        const isFailing = Math.abs(stateParam) === 1;
        let tangentPointTop = null, tangentPointBottom = null;

        if (isFailing) {
          const tangentX = center - radius * Math.sin(phiRad);
          const tangentY = radius * Math.cos(phiRad);
          tangentPointTop = { x: tangentX, y: tangentY };
          tangentPointBottom = { x: tangentX, y: -tangentY };
        }

        const activeAngle = 45 + phi / 2;
        const passiveAngle = 45 - phi / 2;

        return { phiRad, sigmaH, center, radius, isFailing, tangentPointTop, tangentPointBottom, activeAngle, passiveAngle, c };
      }, [phi, c, stateParam]);

      const { phiRad, sigmaH, center, radius, isFailing, tangentPointTop, tangentPointBottom, activeAngle, passiveAngle } = calculations;

      const svgWidth = 600, svgHeight = 500; 
      const toX = (sigma) => 40 + sigma * zoom; 
      const toY = (tau) => 250 - tau * zoom;

      const gridStepX = zoom > 2.5 ? 20 : (zoom > 1.2 ? 50 : 100);
      const gridStepY = zoom > 2.5 ? 20 : (zoom > 1.2 ? 50 : 100);
      
      const gridX = []; for(let i = -200; i <= 1500 / zoom; i += gridStepX) { if(i !== 0) gridX.push(i); }
      const gridY = []; for(let i = -400; i <= 400 / zoom; i += gridStepY) { if(i !== 0) gridY.push(i); }

      const mainF = stateParam < 0 ? tangentPointBottom : tangentPointTop;
      const midPoleX = isFailing && mainF ? (toX(sigmaH) + toX(mainF.x))/2 : 0;
      const midPoleY = isFailing && mainF ? (toY(0) + toY(mainF.y))/2 : 0;

      const wallBaseX = 220;
      const wallTopY = 30;
      const wallBotY = 130;
      const wallH = wallBotY - wallTopY;
      const currWallX = wallBaseX - stateParam * 10;
      const failRad = (stateParam < 0 ? activeAngle : passiveAngle) * Math.PI / 180;
      const exitX = currWallX - wallH / Math.tan(failRad);
      
      const vbLeft = isFailing ? Math.min(wallBaseX - 120, exitX - 50) : wallBaseX - 120;
      const vbRight = wallBaseX + 40;
      const vbWidth = vbRight - vbLeft;
      const vbHeight = 150;

      return (
        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 animate-fadeIn">
          {showProof && (
            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-50 p-4" onClick={() => setShowProof(false)}>
              <div className="bg-white rounded-2xl shadow-2xl max-w-3xl w-full max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
                <div className="sticky top-0 bg-white border-b border-slate-100 p-5 flex justify-between items-center rounded-t-2xl z-10">
                  <h2 className="text-xl font-bold text-slate-800">Μαθηματική Απόδειξη K<sub>a</sub> και K<sub>p</sub></h2>
                  <button onClick={() => setShowProof(false)} className="p-2 hover:bg-slate-100 rounded-full text-slate-500 hover:text-slate-800 transition-colors">
                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                  </button>
                </div>
                
                <div className="p-6 space-y-6 text-slate-700 leading-relaxed text-[15px]">
                  <section>
                    <h3 className="font-bold text-slate-800 mb-2 border-l-4 border-blue-500 pl-3">1. Γεωμετρία στον Κύκλο Mohr κατά την Αστοχία</h3>
                    <p className="mb-3">Στην οριακή κατάσταση αστοχίας (Rankine), ο κύκλος του Mohr εφάπτεται στην περιβάλλουσα αστοχίας του Coulomb.</p>
                    <div className="bg-slate-50 p-4 rounded-lg font-serif text-center flex flex-wrap items-center justify-center gap-x-4 gap-y-2">
                      <span>sin(φ) = <Fraction num="Ακτίνα Κύκλου (R)" den="Απόσταση Κέντρου (C)" /></span>
                      <span className="text-slate-400">|</span>
                      <span>R = <Fraction num={<>σ<sub>1</sub> - σ<sub>3</sub></>} den="2" /></span>
                      <span className="text-slate-400">|</span>
                      <span>C = <Fraction num={<>σ<sub>1</sub> + σ<sub>3</sub></>} den="2" /></span>
                    </div>
                    <p className="mt-3 text-center font-serif font-medium">Επομένως: &nbsp;&nbsp; sin(φ) = <Fraction num={<>σ<sub>1</sub> - σ<sub>3</sub></>} den={<>σ<sub>1</sub> + σ<sub>3</sub></>} /></p>
                  </section>

                  <section>
                    <h3 className="font-bold text-slate-800 mb-2 border-l-4 border-blue-500 pl-3">2. Γενική Σχέση Κύριων Τάσεων</h3>
                    <div className="bg-slate-50 p-4 rounded-lg font-serif space-y-3 text-center">
                      <div>σ<sub>1</sub>·sin(φ) + σ<sub>3</sub>·sin(φ) = σ<sub>1</sub> - σ<sub>3</sub></div>
                      <div>σ<sub>3</sub>·(1 + sin(φ)) = σ<sub>1</sub>·(1 - sin(φ))</div>
                      <div className="pt-2"><Fraction num={<>σ<sub>1</sub></>} den={<>σ<sub>3</sub></>} /> = <Fraction num="1 + sin(φ)" den="1 - sin(φ)" /></div>
                    </div>
                  </section>

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6 pt-4 border-t border-slate-100">
                    <section>
                      <h3 className="font-bold text-red-600 mb-2">3. Ενεργητική (K<sub>a</sub>)</h3>
                      <p className="text-sm mb-2">σ<sub>3</sub> = σ<sub>h</sub>, σ<sub>1</sub> = σ<sub>v</sub></p>
                      <div className="bg-red-50 p-3 rounded-lg font-serif text-sm mb-3">
                        <div className="text-center font-bold mb-1">K<sub>a</sub> = <Fraction num="1 - sin(φ)" den="1 + sin(φ)" /></div>
                        <div className="text-center font-bold text-slate-500 text-xs">ή K<sub>a</sub> = tan<sup>2</sup>(45° - φ/2)</div>
                      </div>
                      <div className="bg-white border border-red-100 p-3 rounded-lg font-serif text-sm">
                        <div className="font-semibold text-slate-700 mb-1 text-xs">Χωρίς Συνοχή (c=0):</div>
                        <div className="text-center font-bold text-red-700 mb-2">σ<sub>a</sub> = K<sub>a</sub> · σ<sub>v</sub></div>
                        <div className="font-semibold text-slate-700 mb-1 text-xs border-t border-slate-100 pt-2">Με Συνοχή (c&gt;0):</div>
                        <div className="text-center font-bold text-red-700">σ<sub>a</sub> = K<sub>a</sub> · σ<sub>v</sub> - 2c√K<sub>a</sub></div>
                      </div>
                    </section>
                    <section>
                      <h3 className="font-bold text-blue-600 mb-2">4. Παθητική (K<sub>p</sub>)</h3>
                      <p className="text-sm mb-2">σ<sub>1</sub> = σ<sub>h</sub>, σ<sub>3</sub> = σ<sub>v</sub></p>
                      <div className="bg-blue-50 p-3 rounded-lg font-serif text-sm mb-3">
                        <div className="text-center font-bold mb-1">K<sub>p</sub> = <Fraction num="1 + sin(φ)" den="1 - sin(φ)" /></div>
                        <div className="text-center font-bold text-slate-500 text-xs">ή K<sub>p</sub> = tan<sup>2</sup>(45° + φ/2)</div>
                      </div>
                      <div className="bg-white border border-blue-100 p-3 rounded-lg font-serif text-sm">
                        <div className="font-semibold text-slate-700 mb-1 text-xs">Χωρίς Συνοχή (c=0):</div>
                        <div className="text-center font-bold text-blue-700 mb-2">σ<sub>p</sub> = K<sub>p</sub> · σ<sub>v</sub></div>
                        <div className="font-semibold text-slate-700 mb-1 text-xs border-t border-slate-100 pt-2">Με Συνοχή (c&gt;0):</div>
                        <div className="text-center font-bold text-blue-700">σ<sub>p</sub> = K<sub>p</sub> · σ<sub>v</sub> + 2c√K<sub>p</sub></div>
                      </div>
                    </section>
                  </div>
                </div>
              </div>
            </div>
          )}

          {showPoleExplanation && (
            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-50 p-4" onClick={() => setShowPoleExplanation(false)}>
              <div className="bg-white rounded-2xl shadow-2xl max-w-4xl w-full max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
                <div className="sticky top-0 bg-white border-b border-slate-100 p-5 flex justify-between items-center rounded-t-2xl z-10">
                  <h2 className="text-xl font-bold text-slate-800">Γραφική Εύρεση Πόλου (Ορίου Επιπέδων)</h2>
                  <button onClick={() => setShowPoleExplanation(false)} className="p-2 hover:bg-slate-100 rounded-full text-slate-500 hover:text-slate-800 transition-colors">
                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                  </button>
                </div>
                <div className="p-6 grid grid-cols-1 md:grid-cols-2 gap-8 text-slate-700 leading-relaxed text-[15px]">
                  <div className="space-y-5">
                    <p>Ο <strong>Πόλος (ή Όριο Επιπέδων)</strong> είναι ένα μοναδικό σημείο πάνω στον κύκλο του Mohr. Η ιδιότητά του είναι ότι αν φέρουμε μια ευθεία από τον Πόλο, παράλληλη προς ένα οποιοδήποτε φυσικό επίπεδο μέσα στο έδαφος, η τομή της με τον κύκλο μας δίνει τις τάσεις (σ, τ) που ασκούνται σε αυτό το επίπεδο.</p>
                    <div className="bg-amber-50 border border-amber-100 p-4 rounded-xl">
                      <h3 className="font-bold text-amber-800 mb-2">Βήματα γραφικής εύρεσης:</h3>
                      <ol className="list-decimal pl-5 space-y-2 text-amber-900">
                        <li>Η κατακόρυφη τάση <strong>σ<sub>v</sub></strong> ασκείται σε <strong>οριζόντιο επίπεδο</strong>. Από το σημείο (σ<sub>v</sub>, 0) φέρνουμε οριζόντια γραμμή.</li>
                        <li>Η οριζόντια τάση <strong>σ<sub>h</sub></strong> ασκείται σε <strong>κατακόρυφο επίπεδο</strong>. Από το (σ<sub>h</sub>, 0) φέρνουμε κατακόρυφη γραμμή.</li>
                        <li>Το σημείο τομής αυτών των δύο γραμμών πάνω στον κύκλο, είναι ο Πόλος.</li>
                      </ol>
                    </div>
                    <p className="font-medium text-slate-800 bg-slate-50 p-4 rounded-xl border border-slate-100">
                      <strong>Συμπέρασμα:</strong> Στις γεωστατικές τάσεις, η τομή γίνεται πάνω στον άξονα στο (σ<sub>h</sub>, 0). <u>Άρα ο Πόλος συμπίπτει με την οριζόντια τάση σ<sub>h</sub></u>.
                    </p>
                  </div>
                  <div className="flex flex-col items-center justify-center bg-slate-50 rounded-xl border border-slate-200 p-4">
                    <svg viewBox="0 0 400 300" className="w-full max-w-sm h-auto bg-white rounded-lg shadow-sm border border-slate-100">
                      <line x1="20" y1="150" x2="380" y2="150" stroke="#94a3b8" strokeWidth="1.5" />
                      <text x="365" y="140" fontSize="12" fill="#64748b" fontStyle="italic">σ (kPa)</text>
                      <line x1="60" y1="20" x2="60" y2="280" stroke="#94a3b8" strokeWidth="1.5" />
                      <text x="40" y="35" fontSize="12" fill="#64748b" fontStyle="italic">τ</text>
                      <circle cx="220" cy="150" r="100" fill="rgba(59, 130, 246, 0.05)" stroke="#3b82f6" strokeWidth="2" />
                      <line x1="320" y1="150" x2="120" y2="150" stroke="#f59e0b" strokeWidth="4" strokeDasharray="6 4" opacity="0.6" />
                      <text x="220" y="165" fontSize="10" fill="#d97706" textAnchor="middle" fontWeight="bold">Γραμμή Οριζόντιου Επιπέδου</text>
                      <line x1="120" y1="30" x2="120" y2="270" stroke="#ef4444" strokeWidth="2" strokeDasharray="6 4" />
                      <text x="125" y="45" fontSize="10" fill="#ef4444" fontWeight="bold">Γραμμή Κατακόρυφου Επιπέδου</text>
                      <circle cx="320" cy="150" r="5" fill="#1e293b" />
                      <text x="320" y="135" fontSize="14" fill="#1e293b" textAnchor="middle" fontWeight="bold">σ<tspan baselineShift="sub" fontSize="10">v</tspan></text>
                      <circle cx="120" cy="150" r="5" fill="#3b82f6" />
                      <text x="120" y="185" fontSize="14" fill="#3b82f6" textAnchor="middle" fontWeight="bold">σ<tspan baselineShift="sub" fontSize="10">h</tspan></text>
                      <circle cx="120" cy="150" r="8" fill="none" stroke="#d97706" strokeWidth="3" />
                      <path d="M 80 110 L 110 140" stroke="#d97706" strokeWidth="2" markerEnd="url(#arrow-w)" />
                      <text x="75" y="105" fontSize="14" fill="#d97706" fontWeight="bold" textAnchor="middle">Πόλος (P)</text>
                    </svg>
                  </div>
                </div>
              </div>
            </div>
          )}

          <div className="lg:col-span-3 flex flex-col gap-6">
            <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-200 flex flex-col gap-5">
              <h3 className="text-sm font-bold text-slate-800 border-b pb-2">Παράμετροι</h3>
              <div className="space-y-3">
                <label className="block text-sm font-semibold text-slate-700">Μετακίνηση Τοίχου</label>
                <input type="range" min="-1" max="1" step="0.01" value={stateParam} onChange={(e) => setStateParam(parseFloat(e.target.value))} className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600"/>
                <div className="flex justify-between text-[11px] font-medium text-slate-500">
                  <span className={stateParam === -1 ? "text-red-600 font-bold" : ""}>Ενεργητική</span>
                  <span className={stateParam === 0 ? "text-green-600 font-bold" : ""}>Ηρεμία</span>
                  <span className={stateParam === 1 ? "text-blue-600 font-bold" : ""}>Παθητική</span>
                </div>
              </div>
              <div className="space-y-3">
                <label className="block text-sm font-semibold text-slate-700">Γωνία Τριβής, φ ({phi}°)</label>
                <input type="range" min="20" max="45" step="1" value={phi} onChange={(e) => setPhi(parseInt(e.target.value))} className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-slate-600"/>
              </div>
              <div className="space-y-3">
                <label className="block text-sm font-semibold text-slate-700">Συνοχή, c ({c} kPa)</label>
                <input type="range" min="0" max="50" step="1" value={c} onChange={(e) => setC(parseInt(e.target.value))} className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-amber-600"/>
              </div>
              <div className="space-y-3">
                <label className="block text-sm font-semibold text-slate-700">Zoom Γραφήματος ({zoom}x)</label>
                <input type="range" min="0.4" max="5" step="0.1" value={zoom} onChange={(e) => setZoom(parseFloat(e.target.value))} className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-teal-600"/>
              </div>
            </div>

            <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <h3 className="text-sm font-bold text-slate-800 mb-3 border-b pb-2">Τρέχουσες Τιμές</h3>
              <div className="grid grid-cols-2 gap-y-3 text-sm text-slate-600 mb-4">
                <div>σ<sub>v</sub>:</div>
                <div className="font-mono font-bold text-slate-800 text-right">{sigmaV.toFixed(1)} kPa</div>
                <div>σ<sub>h</sub>:</div>
                <div className="font-mono font-bold text-blue-600 text-right">{sigmaH.toFixed(1)} kPa</div>
                <div className="pt-2 border-t border-slate-100">K = σ<sub>h</sub> / σ<sub>v</sub>:</div>
                <div className="pt-2 border-t border-slate-100 font-mono font-bold text-right">{(sigmaH/sigmaV).toFixed(3)}</div>
              </div>
            </div>

            <div className="flex gap-3">
              <button onClick={() => setShowProof(true)} className="flex-1 flex flex-col items-center justify-center gap-1 bg-slate-800 text-white px-3 py-3 rounded-xl font-semibold hover:bg-slate-700 transition-colors shadow-sm text-xs">
                <svg className="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                Απόδειξη Rankine
              </button>
              <button onClick={() => setShowPoleExplanation(true)} className="flex-1 flex flex-col items-center justify-center gap-1 bg-amber-600 text-white px-3 py-3 rounded-xl font-semibold hover:bg-amber-700 transition-colors shadow-sm text-xs">
                <svg className="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"></path></svg>
                Εύρεση Πόλου
              </button>
            </div>
          </div>

          <div className="lg:col-span-5 flex flex-col gap-6">
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col items-center h-full">
              <h2 className="text-lg font-bold text-slate-700 mb-4">Επίπεδο Mohr (σ, τ)</h2>
              <div className="relative w-full h-full min-h-[300px] overflow-hidden border border-slate-100 rounded bg-slate-50/50 flex items-center">
                <svg viewBox={`0 0 ${svgWidth} ${svgHeight}`} className="w-full h-auto">
                  <g stroke="#e2e8f0" strokeWidth="1" strokeDasharray="4 4">
                    {gridX.map(v => <line key={`v-${v}`} x1={toX(v)} y1={0} x2={toX(v)} y2={svgHeight} />)}
                    {gridY.map(v => <line key={`h-${v}`} x1={0} y1={toY(v)} x2={svgWidth} y2={toY(v)} />)}
                  </g>

                  <line x1={0} y1={toY(0)} x2={svgWidth} y2={toY(0)} stroke="#64748b" strokeWidth="2" />
                  <line x1={toX(0)} y1={0} x2={toX(0)} y2={svgHeight} stroke="#64748b" strokeWidth="2" />
                  <text x={svgWidth - 45} y={toY(0) - 10} fill="#475569" fontSize="14" fontStyle="italic">σ (kPa)</text>
                  <text x={toX(0) - 35} y={20} fill="#475569" fontSize="14" fontStyle="italic">τ (kPa)</text>

                  <line x1={toX(-c / Math.tan(phiRad))} y1={toY(0)} x2={toX(1000 / zoom)} y2={toY(c + (1000 / zoom) * Math.tan(phiRad))} stroke="#ef4444" strokeWidth="2" />
                  <line x1={toX(-c / Math.tan(phiRad))} y1={toY(0)} x2={toX(1000 / zoom)} y2={toY(-(c + (1000 / zoom) * Math.tan(phiRad)))} stroke="#ef4444" strokeWidth="2" strokeDasharray="4 4"/>
                  
                  <text transform={`rotate(${-phi}, ${toX(0)}, ${toY(c)})`} x={toX(120)} y={toY(c) - 8} fill="#ef4444" fontSize="12" fontWeight="bold">Κριτήριο Αστοχίας τ = c + σ·tan(φ)</text>

                  <circle cx={toX(center)} cy={toY(0)} r={radius * zoom} fill="rgba(59, 130, 246, 0.05)" stroke={isFailing ? "#ef4444" : "#3b82f6"} strokeWidth="2.5" />

                  <circle cx={toX(center)} cy={toY(0)} r="3" fill="#64748b" />
                  <text x={toX(center)} y={toY(0) - 10} fill="#64748b" fontSize="12" textAnchor="middle" fontWeight="bold">C</text>

                  <circle cx={toX(sigmaV)} cy={toY(0)} r="4" fill="#1e293b" />
                  <text x={toX(sigmaV)} y={toY(0) + 35} fill="#1e293b" fontSize="14" textAnchor="middle" fontWeight="bold">σ<tspan baselineShift="sub" fontSize="10">v</tspan></text>
                  
                  <circle cx={toX(sigmaH)} cy={toY(0)} r="4" fill="#3b82f6" />
                  <text x={toX(sigmaH)} y={toY(0) + 35} fill="#3b82f6" fontSize="14" textAnchor="middle" fontWeight="bold">σ<tspan baselineShift="sub" fontSize="10">h</tspan></text>

                  <circle cx={toX(sigmaH)} cy={toY(0)} r="6" fill="#f59e0b" stroke="#fff" strokeWidth="2" />
                  <text x={toX(sigmaH) + (stateParam > 0 ? 15 : -15)} y={toY(0) - 15} fill="#d97706" fontSize="14" fontWeight="bold" textAnchor={stateParam > 0 ? "start" : "end"}>Πόλος (P)</text>

                  {isFailing && tangentPointTop && (
                    <g>
                      <line x1={toX(tangentPointTop.x)} y1={toY(tangentPointTop.y)} x2={toX(sigmaV)} y2={toY(0)} stroke="#94a3b8" strokeWidth="1.5" strokeDasharray="3 3" />
                      <line x1={toX(tangentPointTop.x)} y1={toY(tangentPointTop.y)} x2={toX(sigmaH)} y2={toY(0)} stroke="#94a3b8" strokeWidth="1.5" strokeDasharray="3 3" />
                      
                      <circle cx={toX(tangentPointTop.x)} cy={toY(tangentPointTop.y)} r="4" fill="#ef4444" />
                      <circle cx={toX(tangentPointBottom.x)} cy={toY(tangentPointBottom.y)} r="4" fill="#ef4444" />
                      
                      <line x1={toX(sigmaH)} y1={toY(0)} x2={toX(mainF.x)} y2={toY(mainF.y)} stroke="#f59e0b" strokeWidth="3" />
                      
                      <text x={midPoleX} y={midPoleY - 15} fontSize="10" fill="#d97706" fontWeight="bold" textAnchor={stateParam < 0 ? "start" : "end"}>Παράλληλη με το</text>
                      <text x={midPoleX} y={midPoleY - 3} fontSize="10" fill="#d97706" fontWeight="bold" textAnchor={stateParam < 0 ? "start" : "end"}>επίπεδο αστοχίας</text>
                      
                      {stateParam < 0 ? (
                        <g>
                          <path d={`M ${toX(sigmaH) + 40} ${toY(0)} A 40 40 0 0 0 ${toX(sigmaH) + 40 * Math.cos(activeAngle * Math.PI/180)} ${toY(0) - 40 * Math.sin(activeAngle * Math.PI/180)}`} fill="none" stroke="#f59e0b" strokeWidth="2" />
                          <text x={toX(sigmaH) + 60 * Math.cos(activeAngle * Math.PI/180 / 2)} y={toY(0) - 60 * Math.sin(activeAngle * Math.PI/180 / 2)} fill="#1e293b" fontSize="10" textAnchor="middle">
                            <tspan x={toX(sigmaH) + 60 * Math.cos(activeAngle * Math.PI/180 / 2)} dy="-5">θ = 45° + φ/2</tspan>
                          </text>
                        </g>
                      ) : (
                        <g>
                          <path d={`M ${toX(sigmaH) - 40} ${toY(0)} A 40 40 0 0 1 ${toX(sigmaH) - 40 * Math.cos(passiveAngle * Math.PI/180)} ${toY(0) - 40 * Math.sin(passiveAngle * Math.PI/180)}`} fill="none" stroke="#f59e0b" strokeWidth="2" />
                          <text x={toX(sigmaH) - 60 * Math.cos(passiveAngle * Math.PI/180 / 2)} y={toY(0) - 60 * Math.sin(passiveAngle * Math.PI/180 / 2)} fill="#1e293b" fontSize="10" textAnchor="middle">
                            <tspan x={toX(sigmaH) - 60 * Math.cos(passiveAngle * Math.PI/180 / 2)} dy="-5">θ = 45° - φ/2</tspan>
                          </text>
                        </g>
                      )}
                    </g>
                  )}
                </svg>
              </div>
            </div>
          </div>

          <div className="lg:col-span-4 flex flex-col gap-6">
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 h-full flex flex-col">
              <h2 className="text-lg font-bold text-slate-700 mb-4">Φυσικό Μοντέλο</h2>
              <div className="relative w-full flex-1 min-h-[300px] bg-[#f8fafc] rounded border border-slate-100 overflow-hidden flex items-center justify-center">
                
                <svg viewBox={`${vbLeft} 0 ${vbWidth} ${vbHeight}`} className="w-full h-auto max-h-full">
                  <defs>
                    <marker id="arrowHeadTab1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1e293b" /></marker>
                  </defs>
                  
                  <rect x={vbLeft} y={wallTopY} width={currWallX - vbLeft} height={wallH} fill="#fcd34d" opacity="0.3" />
                  <line x1={vbLeft} y1={wallTopY} x2={currWallX} y2={wallTopY} stroke="#b45309" strokeWidth="2" />
                  
                  <rect x={currWallX} y={wallTopY} width="10" height={wallH} fill="#64748b" />
                  <line x1={currWallX} y1={wallTopY} x2={currWallX} y2={wallBotY} stroke="#334155" strokeWidth="1" />
                  
                  {stateParam < 0 && <path d={`M${currWallX+15},${wallTopY+35} L${currWallX+25},${wallTopY+35} L${currWallX+25},${wallTopY+30} L${currWallX+35},${wallTopY+37.5} L${currWallX+25},${wallTopY+45} L${currWallX+25},${wallTopY+40} L${currWallX+15},${wallTopY+40} Z`} fill="#ef4444" />}
                  {stateParam > 0 && <path d={`M${currWallX+35},${wallTopY+35} L${currWallX+25},${wallTopY+35} L${currWallX+25},${wallTopY+30} L${currWallX+15},${wallTopY+37.5} L${currWallX+25},${wallTopY+45} L${currWallX+25},${wallTopY+40} L${currWallX+35},${wallTopY+40} Z`} fill="#3b82f6" />}

                  {isFailing && (
                    <g>
                      <line x1={exitX} y1={wallBotY} x2={currWallX} y2={wallBotY} stroke="#94a3b8" strokeWidth="1" strokeDasharray="3 3" />
                      <line x1={currWallX} y1={wallBotY} x2={exitX} y2={wallTopY} stroke="#f59e0b" strokeWidth="3" />
                      <path d={`M${currWallX},${wallBotY} L${currWallX},${wallTopY} L${exitX},${wallTopY} Z`} fill="#f59e0b" opacity="0.15" />
                      
                      <path d={`M ${currWallX - 25} ${wallBotY} A 25 25 0 0 1 ${currWallX - 25 * Math.cos(failRad)} ${wallBotY - 25 * Math.sin(failRad)}`} fill="none" stroke="#f59e0b" strokeWidth="2" />
                      
                      <text x={currWallX - 45 * Math.cos(failRad / 2)} y={wallBotY - 45 * Math.sin(failRad / 2) + 5} fill="#1e293b" fontSize="10" textAnchor="middle" fontWeight="bold">
                        <tspan>θ = 45° {stateParam < 0 ? '+' : '-'} φ/2</tspan>
                      </text>
                      
                      <text x={exitX + 25} y={wallTopY - 20} fontSize="11" fill="#1e293b" fontWeight="bold" textAnchor="middle">Επίπεδο Αστοχίας</text>
                      <path d={`M${exitX + 15},${wallTopY - 16} L${exitX + 3},${wallTopY - 4}`} stroke="#1e293b" strokeWidth="1.5" markerEnd="url(#arrowHeadTab1)"/>
                    </g>
                  )}
                </svg>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // --- TAB 2: COULOMB THEORY ---
    const CoulombTab = () => {
      const [coulombState, setCoulombState] = useState('active');
      const [phi, setPhi] = useState(30);
      const [delta, setDelta] = useState(15);
      const [omega, setOmega] = useState(10); 
      const [beta, setBeta] = useState(10);    
      const [showProof, setShowProof] = useState(false);

      const handlePhiChange = (e) => {
        const val = parseInt(e.target.value);
        setPhi(val);
        if (delta > val) setDelta(val);
        if (beta >= val) setBeta(val - 1);
      };

      const calculations = useMemo(() => {
        const toRad = (deg) => deg * Math.PI / 180;
        const phiR = toRad(phi), deltaR = toRad(delta), omegaR = toRad(omega), betaR = toRad(beta);
        const alphaR = toRad(omega + 90); 
        
        const numA = Math.pow(Math.sin(alphaR + phiR), 2);
        const termA1 = Math.pow(Math.sin(alphaR), 2) * Math.sin(alphaR - deltaR);
        let termA2 = 0;
        const innerRootA = (Math.sin(phiR + deltaR) * Math.sin(phiR - betaR)) / (Math.sin(alphaR - deltaR) * Math.sin(alphaR + betaR));
        if (innerRootA >= 0) termA2 = Math.pow(1 + Math.sqrt(innerRootA), 2);
        const Ka = termA2 > 0 ? numA / (termA1 * termA2) : NaN;

        const numP = Math.pow(Math.sin(alphaR - phiR), 2);
        const termP1 = Math.pow(Math.sin(alphaR), 2) * Math.sin(alphaR + deltaR);
        let termP2 = 0;
        const innerRootP = (Math.sin(phiR + deltaR) * Math.sin(phiR + betaR)) / (Math.sin(alphaR + deltaR) * Math.sin(alphaR + betaR));
        if (innerRootP >= 0) termP2 = Math.pow(1 - Math.sqrt(innerRootP), 2);
        const Kp = termP2 > 0 ? numP / (termP1 * termP2) : NaN;

        const getRhoCoulomb = (isActive) => {
            let bestR = isActive ? 45 + phi/2 : 45 - phi/2;
            let extremeP = isActive ? -Infinity : Infinity;
            let maxRhoDeg = omega < 0 ? 90 + omega - 0.1 : 89.9;
            
            for(let r = Math.max(beta + 0.1, 0.1); r <= maxRhoDeg; r += 0.1) {
                let rhoR = toRad(r);
                let wFactor = (1 + Math.tan(omegaR) * Math.tan(rhoR)) / (Math.tan(rhoR) - Math.tan(betaR));
                if (wFactor <= 0) continue; 

                if (isActive) {
                    let num = Math.sin(rhoR - phiR);
                    let den = Math.cos(rhoR - phiR - omegaR - deltaR);
                    if (den > 0) {
                        let Pa = wFactor * num / den;
                        if (Pa > extremeP) { extremeP = Pa; bestR = r; }
                    }
                } else {
                    let num = Math.sin(rhoR + phiR);
                    let den = Math.cos(rhoR + phiR - omegaR + deltaR);
                    if (den > 0) {
                        let Pp = wFactor * num / den;
                        if (Pp > 0 && Pp < extremeP) { extremeP = Pp; bestR = r; }
                    }
                }
            }
            return bestR;
        };

        const rhoA = getRhoCoulomb(true);
        const rhoP = getRhoCoulomb(false);

        return { Ka, Kp, alphaR, betaR, deltaR, phiR, omegaR, rhoA, rhoP };
      }, [phi, delta, omega, beta]);

      const isActive = coulombState === 'active';

      const svgW = 750, svgH = 350;
      const bx = 160, by = 300; 
      const H_wall = 220;
      
      const tx = bx + H_wall * Math.cos(calculations.alphaR);
      const ty = by - H_wall * Math.sin(calculations.alphaR);

      let baseRho = isActive ? calculations.rhoA : calculations.rhoP;
      const rhoVisRad = baseRho * Math.PI / 180;

      const m1 = -Math.tan(calculations.betaR);
      const m2 = -Math.tan(rhoVisRad);
      let trueFx = (m1 * tx - ty - m2 * bx + by) / (m1 - m2);
      let trueFy = m1 * (trueFx - tx) + ty;
      
      let polyPoints = "";
      let fx = trueFx, fy = trueFy;
      let wx, wy;

      if (trueFx > svgW - 20) { 
        fx = svgW - 20; 
        let fyTop = m1 * (fx - tx) + ty;
        let fyBot = m2 * (fx - bx) + by;
        polyPoints = `${bx},${by} ${tx},${ty} ${fx},${fyTop} ${fx},${fyBot}`;
        wx = (bx + tx + fx + fx) / 4;
        wy = (by + ty + fyTop + fyBot) / 4;
      } else {
        polyPoints = `${bx},${by} ${tx},${ty} ${fx},${fy}`;
        wx = (bx + tx + fx) / 3;
        wy = (by + ty + fy) / 3;
      }

      if (wx > svgW - 40) {
          wx = svgW - 80;
      }

      const px = bx + (tx - bx) * 0.333;
      const py = by + (ty - by) * 0.333;

      const omegaR = calculations.omegaR;
      const pAngleLeft = omegaR + (isActive ? calculations.deltaR : -calculations.deltaR);
      const pLen = 90;
      const pStartX = px + pLen * Math.cos(pAngleLeft);
      const pStartY = py - pLen * Math.sin(pAngleLeft);

      const bgX = Math.max(svgW, fx) + 500;
      const bgY = ty - (bgX - tx) * Math.tan(calculations.betaR);

      // --- ΝΕΟ: ΥΠΟΛΟΓΙΣΜΟΣ ΖΩΝΤΑΝΟΥ ΔΥΝΑΜΟΠΟΛΥΓΩΝΟΥ ---
      const L_W = 100; // Σταθερό οπτικό μήκος του Βάρους W
      
      // Γωνία R (από την οριζόντιο) - Κάθετη στο επίπεδο + τριβή
      const thetaR_deg = 90 + baseRho - (isActive ? phi : -phi);
      const thetaR_rad = thetaR_deg * Math.PI / 180;
      
      const cosP = Math.cos(pAngleLeft);
      const sinP = Math.sin(pAngleLeft);
      const cosR = Math.cos(thetaR_rad);
      const sinR = Math.sin(thetaR_rad);

      // Επίλυση συστήματος διανυσμάτων (W + R + P = 0)
      const denom = Math.sin(thetaR_rad - pAngleLeft);
      const M_R_safe = (L_W * cosP) / denom;
      
      // Σημείο τομής διανυσμάτων R και P
      const intX = M_R_safe * cosR;
      const intY = L_W - M_R_safe * sinR;

      // Δυναμικό ViewBox για να κεντράρεται τέλεια το τρίγωνο
      const polyMinX = Math.min(0, intX) - 35;
      const polyMaxX = Math.max(0, intX) + 35;
      const polyMinY = Math.min(0, intY) - 25;
      const polyMaxY = Math.max(L_W, intY) + 25;

      return (
        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 animate-fadeIn">
          {showProof && (
            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-50 p-4" onClick={() => setShowProof(false)}>
              <div className="bg-white rounded-2xl shadow-2xl max-w-4xl w-full max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
                <div className="sticky top-0 bg-white border-b border-slate-100 p-5 flex justify-between items-center rounded-t-2xl z-10">
                  <h2 className="text-xl font-bold text-slate-800">Μαθηματική Απόδειξη Coulomb (Δυναμοπολύγωνο)</h2>
                  <button onClick={() => setShowProof(false)} className="p-2 hover:bg-slate-100 rounded-full text-slate-500 hover:text-slate-800 transition-colors">
                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                  </button>
                </div>
                <div className="p-6 grid grid-cols-1 md:grid-cols-2 gap-8 text-slate-700 leading-relaxed text-[15px]">
                  <div className="space-y-6">
                    <section>
                      <h3 className="font-bold text-slate-800 mb-2 border-l-4 border-amber-500 pl-3">1. Παραδοχές και Δυνάμεις</h3>
                      <p className="mb-3">Ο Coulomb (1776) μελετά την ισορροπία της εδαφικής σφήνας η οποία τείνει να ολισθήσει. Ασκούνται 3 κύριες δυνάμεις:</p>
                      <ul className="list-disc pl-5 space-y-2">
                        <li><strong>W</strong>: Ίδιο βάρος της σφήνας.</li>
                        <li><strong>R</strong>: Αντίδραση εδάφους στο επίπεδο ολίσθησης (αποκλίνει κατά <strong>φ</strong> από την κάθετο).</li>
                        <li><strong>P<sub>a</sub></strong>: Ενεργητική ώθηση - αντίδραση τοίχου (αποκλίνει κατά <strong>δ</strong> από την κάθετο).</li>
                      </ul>
                    </section>
                    <section>
                      <h3 className="font-bold text-slate-800 mb-2 border-l-4 border-amber-500 pl-3">2. Ισορροπία - Νόμος Ημιτόνων</h3>
                      <p className="mb-3">Εφαρμόζοντας το Νόμο των Ημιτόνων στο κλειστό τρίγωνο δυνάμεων έχουμε:</p>
                      <div className="bg-slate-50 p-4 rounded-lg font-serif text-center text-lg font-bold border border-slate-100 flex justify-center">
                        <Fraction num={<>P<sub>a</sub></>} den="sin(A)" /> <span className="mx-2">=</span> <Fraction num="W" den="sin(B)" /> <span className="mx-2">=</span> <Fraction num="R" den="sin(C)" />
                      </div>
                    </section>
                  </div>
                  <div className="space-y-6">
                    <div className="bg-slate-50 rounded-xl border border-slate-200 p-4 flex flex-col items-center">
                      <h4 className="text-sm font-bold text-slate-600 mb-4">Το Δυναμοπολύγωνο</h4>
                      <svg viewBox="0 0 300 200" className="w-full max-w-[250px]">
                        <defs>
                          <marker id="arrow-w" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1e293b" /></marker>
                          <marker id="arrow-r" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706" /></marker>
                          <marker id="arrow-pa" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" /></marker>
                        </defs>
                        <line x1="150" y1="20" x2="150" y2="150" stroke="#1e293b" strokeWidth="3" markerEnd="url(#arrow-w)"/>
                        <text x="160" y="90" fontSize="16" fontWeight="bold" fill="#1e293b">W</text>
                        <line x1="150" y1="150" x2="60" y2="80" stroke="#f59e0b" strokeWidth="3" markerEnd="url(#arrow-r)"/>
                        <text x="90" y="135" fontSize="16" fontWeight="bold" fill="#d97706">R</text>
                        <line x1="60" y1="80" x2="150" y2="20" stroke="#ef4444" strokeWidth="3" markerEnd="url(#arrow-pa)"/>
                        <text x="75" y="45" fontSize="16" fontWeight="bold" fill="#ef4444">P_a</text>
                      </svg>
                    </div>
                    <section>
                      <h3 className="font-bold text-slate-800 mb-2 border-l-4 border-amber-500 pl-3">3. Εύρεση του Μεγίστου (K<sub>a</sub>)</h3>
                      <p className="mb-2 text-sm">Λύνοντας ως προς P<sub>a</sub> βρίσκουμε μια συνάρτηση που εξαρτάται από τη γωνία αστοχίας θ.</p>
                      <p className="text-sm">Θέτοντας την παράγωγο ίση με μηδέν προκύπτει η δυσμενέστερη ώθηση:</p>
                      <div className="bg-red-50 p-3 mt-3 rounded-lg font-serif text-center font-bold text-red-800 border border-red-100 flex justify-center items-center">
                        <Fraction num={<>dP<sub>a</sub></>} den="dθ" /> <span className="mx-2">= 0</span> &nbsp;&nbsp; ⇒ &nbsp;&nbsp; Προκύπτει ο συντελεστής K<sub>a</sub>
                      </div>
                      
                      <div className="bg-amber-50 p-4 mt-4 rounded-xl border border-amber-200 flex flex-col items-center">
                        <p className="text-[13px] text-amber-900 mb-3 text-center leading-relaxed">
                          Στη θεωρία του Coulomb για την ενεργητική ώθηση, η γωνία της κρίσιμης επιφάνειας αστοχίας (<strong>α<sub>a</sub></strong>) ως προς την οριζόντιο προκύπτει από τη μεγιστοποίηση της ώθησης <strong>P<sub>a</sub></strong>.
                          <br/><br/>
                          Ο τύπος για τη γωνία <strong>α<sub>a</sub></strong> (για οριζόντιο επίχωμα β = 0 και κατακόρυφο τοίχο ω = 0) είναι:
                        </p>
                        <div className="flex justify-center items-center font-serif text-base text-slate-800 font-bold bg-white px-4 py-3 rounded-lg shadow-sm border border-slate-200">
                          <span>tan(α<sub>a</sub>) = tan(φ) + sec(φ)</span>
                          <span className="text-2xl ml-2 font-light">√</span>
                          <span className="border-t border-slate-800 ml-1 pt-1 mt-2">
                              <Fraction num={<>tan(φ) · cos(δ)</>} den={<>tan(φ) + tan(δ)</>} />
                          </span>
                        </div>
                      </div>
                    </section>
                  </div>
                </div>
              </div>
            </div>
          )}

          <div className="lg:col-span-3 flex flex-col gap-6">
            <div className="bg-white p-2 rounded-xl shadow-sm border border-slate-200 flex flex-col xl:flex-row gap-2">
              <button onClick={() => setCoulombState('active')} className={`flex-1 py-3 px-2 rounded-lg font-bold text-[13px] transition-colors ${isActive ? 'bg-red-50 text-red-700 border border-red-100' : 'text-slate-500 hover:bg-slate-50'}`}>Ενεργητική</button>
              <button onClick={() => setCoulombState('passive')} className={`flex-1 py-3 px-2 rounded-lg font-bold text-[13px] transition-colors ${!isActive ? 'bg-blue-50 text-blue-700 border border-blue-100' : 'text-slate-500 hover:bg-slate-50'}`}>Παθητική</button>
            </div>

            <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-200 space-y-5">
              <h3 className="text-sm font-bold text-slate-800 border-b pb-2">Παράμετροι</h3>
              <div className="space-y-2">
                <label className="block text-sm font-semibold text-slate-700">Τριβή Εδάφους, φ ({phi}°)</label>
                <input type="range" min="20" max="45" value={phi} onChange={handlePhiChange} className="w-full h-2 bg-slate-200 rounded-lg accent-amber-600"/>
              </div>
              <div className="space-y-2">
                <label className="block text-sm font-semibold text-slate-700">Τριβή Τοίχου, δ ({delta}°)</label>
                <input type="range" min="0" max={phi} value={delta} onChange={(e) => setDelta(parseInt(e.target.value))} className="w-full h-2 bg-slate-200 rounded-lg accent-amber-700"/>
              </div>
              <div className="space-y-2">
                <label className="block text-sm font-semibold text-slate-700">Κλίση Τοίχου, ω ({omega}°)</label>
                <input type="range" min="-20" max="20" value={omega} onChange={(e) => setOmega(parseInt(e.target.value))} className="w-full h-2 bg-slate-200 rounded-lg accent-slate-600"/>
              </div>
              <div className="space-y-2">
                <label className="block text-sm font-semibold text-slate-700">Κλίση Επιχώματος, β ({beta}°)</label>
                <input type="range" min="-15" max={phi-1} value={beta} onChange={(e) => setBeta(parseInt(e.target.value))} className="w-full h-2 bg-slate-200 rounded-lg accent-green-600"/>
              </div>
            </div>

            <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-200 flex flex-col justify-center min-h-[120px]">
              <div className={`p-4 rounded-xl border text-center flex flex-col items-center justify-center w-full ${isActive ? 'bg-red-50 border-red-100' : 'bg-blue-50 border-blue-100'}`}>
                <div className={`text-3xl font-mono flex items-center justify-center gap-3 ${isActive ? 'text-red-600' : 'text-blue-600'}`}>
                  <span className="font-sans font-bold text-xl text-slate-700">K<sub>{isActive ? 'a' : 'p'}</sub> =</span>
                  {isNaN(isActive ? calculations.Ka : calculations.Kp) ? "Σφάλμα" : (isActive ? calculations.Ka : calculations.Kp).toFixed(3)}
                </div>
              </div>
            </div>

            <button onClick={() => setShowProof(true)} className="w-full flex items-center justify-center gap-2 bg-slate-800 text-white px-5 py-3 rounded-xl font-semibold hover:bg-slate-700 transition-colors shadow-sm">
              <svg className="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
              Δυναμοπολύγωνο
            </button>
          </div>

          <div className="lg:col-span-9 flex flex-col gap-6">
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col items-center">
              <h2 className="text-lg font-bold text-slate-700 mb-4">Θεωρία Σφήνας Coulomb - {isActive ? 'Ενεργητική' : 'Παθητική'} Κατάσταση</h2>
              <div className="w-full bg-[#fafaf9] rounded-xl border border-slate-200 relative overflow-hidden flex items-center justify-center min-h-[400px]">
                
                {/* ΕΝΘΕΤΟ ΛΥΣΗΣ ΚΑΙ ΖΩΝΤΑΝΟ ΔΥΝΑΜΟΠΟΛΥΓΩΝΟ */}
                <div className="absolute bottom-4 right-4 bg-white/95 backdrop-blur p-4 rounded-xl shadow-lg border border-slate-200 text-sm z-10 min-w-[240px] flex flex-col gap-4">
                  
                  {/* Δυναμοπολύγωνο (Live) */}
                  <div className="flex flex-col items-center border-b border-slate-100 pb-4">
                    <h4 className="font-bold text-slate-600 mb-2 text-xs uppercase tracking-wider">Δυναμοπολύγωνο</h4>
                    <svg viewBox={`${polyMinX} ${polyMinY} ${polyMaxX - polyMinX} ${polyMaxY - polyMinY}`} className="w-full h-auto max-h-[140px]">
                      <defs>
                        <marker id="poly-arrow-w" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1e293b" /></marker>
                        <marker id="poly-arrow-r" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706" /></marker>
                        <marker id="poly-arrow-p" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill={isActive ? "#ef4444" : "#3b82f6"} /></marker>
                      </defs>
                      
                      {/* Διάνυσμα W (Προς τα κάτω) */}
                      <line x1="0" y1="0" x2="0" y2={L_W} stroke="#1e293b" strokeWidth="3" markerEnd="url(#poly-arrow-w)" />
                      <text x="10" y={L_W/2 + 5} fontSize="16" fill="#1e293b" fontWeight="bold">W</text>
                      
                      {/* Διάνυσμα R (Από την αιχμή του W προς την τομή) */}
                      <line x1="0" y1={L_W} x2={intX} y2={intY} stroke="#d97706" strokeWidth="3" markerEnd="url(#poly-arrow-r)" />
                      <text x={intX/2 - 15} y={(L_W + intY)/2 + 20} fontSize="16" fill="#d97706" fontWeight="bold">R</text>

                      {/* Διάνυσμα P (Από την τομή πίσω στο (0,0) κλείνοντας το τρίγωνο) */}
                      <line x1={intX} y1={intY} x2="0" y2="0" stroke={isActive ? "#ef4444" : "#3b82f6"} strokeWidth="3" markerEnd="url(#poly-arrow-p)" />
                      <text x={intX/2 - 25} y={intY/2 - 5} fontSize="16" fill={isActive ? "#ef4444" : "#3b82f6"} fontWeight="bold">P<tspan baselineShift="sub" fontSize="12">{isActive ? 'a' : 'p'}</tspan></text>
                    </svg>
                  </div>

                  <div>
                    <h4 className="font-bold text-slate-800 border-b pb-2 mb-2 text-xs uppercase tracking-wider">Υπολογισμένα Μεγέθη</h4>
                    <div className="space-y-2">
                      <div className="flex justify-between items-center gap-6">
                        <span className="text-slate-600">Γωνία Αστοχίας (α):</span>
                        <span className="font-bold text-slate-800">{baseRho.toFixed(1)}°</span>
                      </div>
                      <div className="flex justify-between items-center gap-6">
                        <span className="text-slate-600">Συντελεστής (K<sub>{isActive ? 'a' : 'p'}</sub>):</span>
                        <span className="font-bold text-slate-800">{(isActive ? calculations.Ka : calculations.Kp).toFixed(3)}</span>
                      </div>
                    </div>
                  </div>
                </div>

                <svg viewBox={`0 0 ${svgW} ${svgH}`} className="w-full h-auto max-h-[500px]">
                  <defs>
                    <marker id="arrowHead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1e293b" /></marker>
                    <marker id="arrowP" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill={isActive ? "#ef4444" : "#3b82f6"} /></marker>
                    <marker id="arrowMove" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" /></marker>
                  </defs>

                  <line x1="20" y1={by} x2={bgX} y2={by} stroke="#cbd5e1" strokeWidth="1" strokeDasharray="5 5" />
                  <polygon points={`${bx},${by} ${trueFx},${trueFy} ${bgX},${bgY} ${bgX},${by + 500} ${bx},${by + 500}`} fill="#fef08a" opacity="0.4" />
                  <polygon points={polyPoints} fill="#fde047" opacity="0.8" stroke="#ca8a04" strokeWidth="1" />
                  <line x1={tx} y1={ty} x2={bgX} y2={bgY} stroke="#b45309" strokeWidth="2" />
                  <line x1={bx} y1={by} x2={trueFx > svgW - 20 ? svgW - 20 : fx} y2={trueFx > svgW - 20 ? (m2 * (svgW - 20 - bx) + by) : fy} stroke={isActive ? "#ef4444" : "#3b82f6"} strokeWidth="2.5" strokeDasharray="5 5" />
                  <polygon points={`${bx},${by} ${tx},${ty} ${tx-40},${ty} ${bx-40},${by}`} fill="#64748b" stroke="#334155" strokeWidth="1" />

                  <g transform={`translate(${tx - 30}, ${ty - 25})`}>
                    <text x="0" y="-14" fontSize="11" fontWeight="bold" fill="#475569" textAnchor="middle">Direction of</text>
                    <text x="0" y="-2" fontSize="11" fontWeight="bold" fill="#475569" textAnchor="middle">Wall Movement</text>
                    {isActive ? (
                      <line x1="25" y1="10" x2="-25" y2="10" stroke="#64748b" strokeWidth="1.5" strokeDasharray="4 2" markerEnd="url(#arrowMove)" />
                    ) : (
                      <line x1="-25" y1="10" x2="25" y2="10" stroke="#64748b" strokeWidth="1.5" strokeDasharray="4 2" markerEnd="url(#arrowMove)" />
                    )}
                  </g>

                  <line x1={tx} y1={ty} x2={tx} y2={ty + 60} stroke="#94a3b8" strokeWidth="1.5" strokeDasharray="4 4" />
                  <path d={`M ${tx} ${ty + 40} A 40 40 0 0 ${omegaR < 0 ? 1 : 0} ${tx + 40 * Math.sin(omegaR)} ${ty + 40 * Math.cos(omegaR)}`} fill="none" stroke="#334155" strokeWidth="1.5" />
                  <text x={tx + (omegaR < 0 ? -15 : 15)} y={ty + 50} fontSize="12" fill="#334155" fontWeight="bold">ω</text>

                  <line x1={tx} y1={ty} x2={tx + 70} y2={ty} stroke="#94a3b8" strokeWidth="1.5" strokeDasharray="4 4" />
                  <path d={`M ${tx + 50} ${ty} A 50 50 0 0 ${beta > 0 ? 0 : 1} ${tx + 50 * Math.cos(calculations.betaR)} ${ty - 50 * Math.sin(calculations.betaR)}`} fill="none" stroke="#b45309" strokeWidth="1.5" />
                  <text x={tx + 60} y={ty - 15 * (beta >= 0 ? 1 : -1)} fontSize="12" fill="#b45309" fontWeight="bold">β</text>

                  <path d={`M ${bx + 40} ${by} A 40 40 0 0 0 ${bx + 40 * Math.cos(rhoVisRad)} ${by - 40 * Math.sin(rhoVisRad)}`} fill="none" stroke={isActive ? "#ef4444" : "#3b82f6"} strokeWidth="1.5" />
                  <text x={bx + 50} y={by - 15} fontSize="12" fill={isActive ? "#ef4444" : "#3b82f6"} fontWeight="bold">α<tspan baselineShift="sub" fontSize="9">{isActive ? 'a' : 'p'}</tspan></text>

                  <line x1={wx} y1={wy - 40} x2={wx} y2={wy + 40} stroke="#1e293b" strokeWidth="2.5" markerEnd="url(#arrowHead)" />
                  <text x={wx + 15} y={wy + 15} fontSize="18" fill="#1e293b" fontWeight="bold">W</text>

                  <g>
                    <line x1={px} y1={py} x2={px - 100} y2={py} stroke="#94a3b8" strokeWidth="1.2" strokeDasharray="3 3" />
                    <line x1={px} y1={py} x2={px - 80 * Math.cos(omegaR)} y2={py + 80 * Math.sin(omegaR)} stroke="#94a3b8" strokeWidth="1.2" strokeDasharray="3 3" />
                    
                    <path d={`M ${px - 50} ${py} A 50 50 0 0 ${omegaR < 0 ? 1 : 0} ${px - 50 * Math.cos(omegaR)} ${py + 50 * Math.sin(omegaR)}`} fill="none" stroke="#64748b" strokeWidth="1.2" />
                    <text x={px - 55} y={py + (omegaR < 0 ? -15 : 20)} fontSize="10" fill="#64748b" fontWeight="bold">ω</text>

                    <path 
                      d={`M ${px - 65 * Math.cos(omegaR)} ${py + 65 * Math.sin(omegaR)} A 65 65 0 0 ${isActive ? 0 : 1} ${px - 65 * Math.cos(pAngleLeft)} ${py + 65 * Math.sin(pAngleLeft)}`} 
                      fill="none" stroke="#1e293b" strokeWidth="1.2" 
                    />
                    <text x={px - 75 * Math.cos(omegaR + (isActive?1:-1)*calculations.deltaR/2)} y={py + 75 * Math.sin(omegaR + (isActive?1:-1)*calculations.deltaR/2) + 4} fontSize="11" fill="#1e293b" fontWeight="bold">δ</text>

                    <path d={`M ${px - 85} ${py} A 85 85 0 0 ${pAngleLeft >= 0 ? 0 : 1} ${px - 85 * Math.cos(pAngleLeft)} ${py + 85 * Math.sin(pAngleLeft)}`} fill="none" stroke={isActive ? "#ef4444" : "#3b82f6"} strokeWidth="1" strokeDasharray="2 2" />
                    <text x={px - 90} y={py + (isActive ? 40 : -15)} fontSize="10" fill={isActive ? "#ef4444" : "#3b82f6"} fontWeight="bold">{isActive ? 'ω+δ' : 'ω-δ'}</text>

                    <line 
                      x1={isActive ? px : pStartX} 
                      y1={isActive ? py : pStartY} 
                      x2={isActive ? pStartX : px} 
                      y2={isActive ? pStartY : py} 
                      stroke={isActive ? "#ef4444" : "#3b82f6"} 
                      strokeWidth="3" markerEnd="url(#arrowP)" 
                    />
                    <text x={pStartX - 10} y={pStartY - 10} fontSize="16" fill={isActive ? "#ef4444" : "#3b82f6"} fontWeight="bold">P<tspan baselineShift="sub" fontSize="11">{isActive ? 'a' : 'p'}</tspan></text>
                  </g>
                </svg>
              </div>
            </div>

            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 font-serif overflow-x-auto text-sm md:text-base flex flex-col items-center">
              <h3 className="font-bold font-sans text-slate-800 mb-6 text-center w-full border-b border-slate-100 pb-2">Εξίσωση {isActive ? 'Ενεργητικής' : 'Παθητικής'} Ώθησης Coulomb</h3>
              
              {isActive ? (
                <div className="flex justify-center items-center whitespace-nowrap mb-2 text-red-800 animate-fadeIn">
                  <span className="font-bold mr-4 text-lg">K<sub>a</sub> = </span>
                  <Fraction 
                    num={<>cos<sup>2</sup>(φ + ω)</>} 
                    den={<>
                      cos<sup>2</sup>ω · cos(ω - δ) · 
                      <span className="inline-flex items-center ml-2">
                        <span className="text-3xl mr-1">[</span> 
                        1 + <span className="text-2xl ml-1">√</span>
                        <span className="border-t border-red-800 ml-1 pt-1 mt-1">
                          <Fraction num={<>sin(φ + δ)sin(φ - β)</>} den={<>cos(ω - δ)cos(ω + β)</>} />
                        </span>
                        <span className="text-3xl ml-1">]</span><sup>2</sup>
                      </span>
                    </>} 
                  />
                </div>
              ) : (
                <div className="flex justify-center items-center whitespace-nowrap mb-2 text-blue-800 animate-fadeIn">
                  <span className="font-bold mr-4 text-lg">K<sub>p</sub> = </span>
                  <Fraction 
                    num={<>cos<sup>2</sup>(φ - ω)</>} 
                    den={<>
                      cos<sup>2</sup>ω · cos(ω + δ) · 
                      <span className="inline-flex items-center ml-2">
                        <span className="text-3xl mr-1">[</span> 
                        1 - <span className="text-2xl ml-1">√</span>
                        <span className="border-t border-blue-800 ml-1 pt-1 mt-1">
                          <Fraction num={<>sin(φ + δ)sin(φ + β)</>} den={<>cos(ω + δ)cos(ω + β)</>} />
                        </span>
                        <span className="text-3xl ml-1">]</span><sup>2</sup>
                      </span>
                    </>} 
                  />
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };

    // --- TAB 3: PRESSURE DISTRIBUTIONS (NEW CAD INTERFACE) ---
    const SOIL_COLORS = ['#fef08a', '#fed7aa', '#d9f99d', '#bae6fd', '#e9d5ff', '#fecdd3'];

    const EarthPressureTab = () => {
      const [totalH, setTotalH] = useState(10);
      const [excavationH, setExcavationH] = useState(6);
      const [hwActive, setHwActive] = useState(5);
      const [hwPassive, setHwPassive] = useState(7);
      const [qLoad, setQLoad] = useState(0); 
      const [displayMode, setDisplayMode] = useState('stresses'); 

      const [layers, setLayers] = useState([
        { id: Date.now(), z: 0, c: 0, phi: 30, gammaDry: 18, gammaSat: 20, color: SOIL_COLORS[0] }
      ]);

      const [hoverZ, setHoverZ] = useState(null);

      const handleTotalHChange = (e) => {
        const newH = parseFloat(e.target.value);
        const ratio = newH / totalH;
        
        setTotalH(newH);
        setExcavationH(parseFloat((excavationH * ratio).toFixed(1)));
        setHwActive(parseFloat((hwActive * ratio).toFixed(1)));
        setHwPassive(parseFloat((hwPassive * ratio).toFixed(1)));
        
        setLayers(layers.map(l => ({
          ...l,
          z: l.z === 0 ? 0 : parseFloat((l.z * ratio).toFixed(1))
        })));
        setHoverZ(null);
      };

      const updateLayer = (id, field, value) => {
        setLayers(layers.map(l => l.id === id ? { ...l, [field]: parseFloat(value) || 0 } : l));
      };

      const deleteLayer = (id) => {
        setLayers(layers.filter(l => l.id !== id));
      };

      const handleSvgMove = (e) => {
        const rect = e.currentTarget.getBoundingClientRect();
        const y = e.clientY - rect.top;
        const z = (y / rect.height) * totalH;
        setHoverZ(Math.round(z * 2) / 2); 
      };

      const handleSvgClick = () => {
        if (hoverZ !== null && hoverZ > 0 && hoverZ < totalH && !layers.some(l => l.z === hoverZ)) {
          const newLayer = { id: Date.now(), z: hoverZ, c: 0, phi: 30, gammaDry: 18, gammaSat: 20, color: SOIL_COLORS[layers.length % SOIL_COLORS.length] };
          setLayers([...layers, newLayer].sort((a, b) => a.z - b.z));
        }
      };

      const calculations = useMemo(() => {
        let zPointsSetR = new Set([0, totalH, hwActive]);
        layers.forEach(l => zPointsSetR.add(l.z));
        let zPointsR = Array.from(zPointsSetR).filter(z => z >= 0 && z <= totalH).sort((a, b) => a - b);

        let zPointsSetL = new Set([excavationH, totalH, hwPassive]);
        layers.forEach(l => zPointsSetL.add(l.z));
        let zPointsL = Array.from(zPointsSetL).filter(z => z >= excavationH && z <= totalH).sort((a, b) => a - b);

        let segmentsR = [], segmentsL = [];
        let segmentsQ = []; 
        let segmentsVertR = [], segmentsVertL = []; 
        let svR = 0;
        let zeroDepthsR = []; 

        for (let i = 0; i < zPointsR.length - 1; i++) {
          let zTop = zPointsR[i];
          let zBot = zPointsR[i + 1];
          let dz = zBot - zTop;
          let zMid = (zTop + zBot) / 2;

          let layer = [...layers].reverse().find(l => l.z <= zMid) || layers[0];
          
          let gammaR = zMid > hwActive ? layer.gammaSat : layer.gammaDry;
          let uTopR = Math.max(0, (zTop - hwActive) * 10);
          let uBotR = Math.max(0, (zBot - hwActive) * 10);
          
          let svTopR = svR;
          let svBotR = svR + gammaR * dz;
          svR = svBotR;

          let effTopR = svTopR - uTopR;
          let effBotR = svBotR - uBotR;

          segmentsVertR.push({ zTop, zBot, valTop: effTopR, valBot: effBotR, isNeg: false });

          let Ka = Math.pow(Math.tan((45 - layer.phi / 2) * Math.PI / 180), 2);
          
          let saTop = effTopR * Ka - 2 * layer.c * Math.sqrt(Ka);
          let saBot = effBotR * Ka - 2 * layer.c * Math.sqrt(Ka);

          if (saTop < 0 && saBot > 0) {
            let zZero = zTop + (0 - saTop) / (saBot - saTop) * dz;
            zeroDepthsR.push(zZero); 
            segmentsR.push({ zTop, zBot: zZero, valTop: saTop, valBot: 0, isNeg: true });
            segmentsR.push({ zTop: zZero, zBot, valTop: 0, valBot: saBot, isNeg: false });
          } else if (saTop > 0 && saBot < 0) {
            let zZero = zTop + (0 - saTop) / (saBot - saTop) * dz;
            zeroDepthsR.push(zZero); 
            segmentsR.push({ zTop, zBot: zZero, valTop: saTop, valBot: 0, isNeg: false });
            segmentsR.push({ zTop: zZero, zBot, valTop: 0, valBot: saBot, isNeg: true });
          } else {
            segmentsR.push({ zTop, zBot, valTop: saTop, valBot: saBot, isNeg: saTop < 0 });
          }
        }

        // ΝΕΟ: Υπολογισμός Φορτίου q αυστηρά και μόνο με βάση τις αλλαγές στρώσεων (K_a)
        if (qLoad > 0) {
          let zPointsSetQ = new Set([0, totalH]);
          layers.forEach(l => { if (l.z <= totalH) zPointsSetQ.add(l.z); });
          let zPointsQ = Array.from(zPointsSetQ).sort((a, b) => a - b);
          
          for (let i = 0; i < zPointsQ.length - 1; i++) {
            let zTop = zPointsQ[i];
            let zBot = zPointsQ[i + 1];
            let zMid = (zTop + zBot) / 2;
            let layer = [...layers].reverse().find(l => l.z <= zMid) || layers[0];
            let Ka = Math.pow(Math.tan((45 - layer.phi / 2) * Math.PI / 180), 2);
            segmentsQ.push({ zTop, zBot, valTop: qLoad * Ka, valBot: qLoad * Ka, isNeg: false });
          }
        }

        let svL = 0;
        for (let i = 0; i < zPointsL.length - 1; i++) {
          let zTop = zPointsL[i];
          let zBot = zPointsL[i + 1];
          let dz = zBot - zTop;
          let zMid = (zTop + zBot) / 2;

          let layer = [...layers].reverse().find(l => l.z <= zMid) || layers[0];
          
          let gammaL = zMid > hwPassive ? layer.gammaSat : layer.gammaDry;
          let uTopL = Math.max(0, (zTop - hwPassive) * 10);
          let uBotL = Math.max(0, (zBot - hwPassive) * 10);

          let svTopL = svL;
          let svBotL = svL + gammaL * dz;
          svL = svBotL;

          let effTopL = Math.max(0, svTopL - uTopL);
          let effBotL = Math.max(0, svBotL - uBotL);

          segmentsVertL.push({ zTop, zBot, valTop: effTopL, valBot: effBotL, isNeg: false });

          let Kp = Math.pow(Math.tan((45 + layer.phi / 2) * Math.PI / 180), 2);
          let spTop = effTopL * Kp + 2 * layer.c * Math.sqrt(Kp);
          let spBot = effBotL * Kp + 2 * layer.c * Math.sqrt(Kp);

          segmentsL.push({ zTop, zBot, valTop: spTop, valBot: spBot, isNeg: false });
        }

        let maxSa = 1, maxSp = 1, maxSv = 1, maxQ = 1;
        segmentsR.forEach(s => maxSa = Math.max(maxSa, Math.abs(s.valTop), Math.abs(s.valBot)));
        segmentsL.forEach(s => maxSp = Math.max(maxSp, Math.abs(s.valTop), Math.abs(s.valBot)));
        segmentsVertR.forEach(s => maxSv = Math.max(maxSv, s.valTop, s.valBot));
        segmentsVertL.forEach(s => maxSv = Math.max(maxSv, s.valTop, s.valBot));
        segmentsQ.forEach(s => maxQ = Math.max(maxQ, s.valTop, s.valBot));
        let maxUw = Math.max((totalH - hwActive) * 10, (totalH - hwPassive) * 10, 1);

        const waterForceL = hwPassive < totalH ? [{ zTop: hwPassive, zBot: totalH, valTop: 0, valBot: (totalH - hwPassive) * 10 }] : [];
        const waterForceR = hwActive < totalH ? [{ zTop: hwActive, zBot: totalH, valTop: 0, valBot: (totalH - hwActive) * 10 }] : [];

        const buildForcesArray = (segments, groupName) => {
          let forces = [];
          segments.forEach(seg => {
            if (seg.isNeg) return; 
            const vTop = seg.valTop || 0;
            const vBot = seg.valBot || 0;
            const dz = seg.zBot - seg.zTop;
            if (dz <= 0) return;
            
            const minV = Math.min(vTop, vBot);
            const maxV = Math.max(vTop, vBot);
            const isTriBottomHeavy = vBot > vTop;
            
            if (minV > 0.05) {
              forces.push({ type: 'rect', F: minV * dz, z: seg.zTop + dz / 2, zTop: seg.zTop, zBot: seg.zBot, vTop: minV, vBot: minV, leverArm: totalH - (seg.zTop + dz / 2), group: groupName });
            }
            
            if (maxV - minV > 0.05) {
              forces.push({ type: 'tri', F: 0.5 * (maxV - minV) * dz, z: isTriBottomHeavy ? seg.zBot - dz / 3 : seg.zTop + dz / 3, zTop: seg.zTop, zBot: seg.zBot, vTop: isTriBottomHeavy ? 0 : maxV - minV, vBot: isTriBottomHeavy ? maxV - minV : 0, leverArm: totalH - (isTriBottomHeavy ? seg.zBot - dz / 3 : seg.zTop + dz / 3), group: groupName });
            }
          });
          return forces;
        };

        let globalId = 1;
        const fWL = buildForcesArray(waterForceL, 'Υδροστατική (Αρ)').map(f => ({ ...f, id: globalId++ }));
        const fPL = buildForcesArray(segmentsL, 'Παθητική σ\'p').map(f => ({ ...f, id: globalId++ }));
        const fAR = buildForcesArray(segmentsR, 'Ενεργητική σ\'h').map(f => ({ ...f, id: globalId++ }));
        const fQ  = buildForcesArray(segmentsQ, 'Φορτίο q').map(f => ({ ...f, id: globalId++ }));
        const fWR = buildForcesArray(waterForceR, 'Υδροστατική (Δε)').map(f => ({ ...f, id: globalId++ }));

        return { segmentsR, segmentsL, segmentsVertR, segmentsVertL, segmentsQ, zeroDepthsR, waterForceR, waterForceL, maxSa, maxSp, maxSv, maxUw, maxQ, fWL, fPL, fAR, fQ, fWR };
      }, [excavationH, hwActive, hwPassive, layers, totalH, qLoad]);

      const { segmentsR, segmentsL, segmentsVertR, segmentsVertL, segmentsQ, zeroDepthsR, waterForceR, waterForceL, maxSa, maxSp, maxSv, maxUw, maxQ, fWL, fPL, fAR, fQ, fWR } = calculations;

      const svgH = totalH * 40;
      
      const wWaterBase = 90, wEarthLBase = 130, wVertLBase = 110, wCenterBase = 160, wVertRBase = 110, wEarthRBase = 130; 
      
      const scaleU = maxUw > 0 ? (wWaterBase - 25) / maxUw : 1;
      const scaleSp = maxSp > 0 ? (wEarthLBase - 35) / maxSp : 1;
      const scaleSv = maxSv > 0 ? (wVertLBase - 35) / maxSv : 1;
      const scaleSa = maxSa > 0 ? (wEarthRBase - 35) / maxSa : 1;
      
      const scaleQ = scaleSa; 
      const dynamicWQ = Math.max(80, maxQ * scaleQ + 70);

      const wWater = wWaterBase;
      const wEarthL = wEarthLBase;
      const wVertL = wVertLBase;
      const wCenter = wCenterBase;
      const wVertR = wVertRBase;
      const wEarthR = wEarthRBase;
      const wQ = dynamicWQ;

      const totalSvgW = wWater + wEarthL + wVertL + wCenter + wVertR + wEarthR + wQ + wWater;

      const renderForcesVisuals = (forcesArray, axisX, color, markerId, isRightSide) => {
        return forcesArray.map((f) => {
          const y = f.z * 40;
          const offset = f.type === 'rect' ? 35 : 75; 
          
          let x1, x2, textX, textAnchor, cx;
          if (isRightSide) {
            x1 = axisX + offset;
            x2 = axisX + 3;
            textX = x1 + 5;
            textAnchor = "start";
            cx = x1 - 10;
          } else {
            x1 = axisX - offset;
            x2 = axisX - 3;
            textX = x1 - 5;
            textAnchor = "end";
            cx = x1 + 10;
          }

          return (
            <g key={`force-${f.id}`}>
              <line x1={x1} y1={y} x2={x2} y2={y} stroke={color} strokeWidth="2.5" markerEnd={`url(#${markerId})`} />
              <circle cx={cx} cy={y} r="7" fill={color} />
              <text x={cx} y={y + 3.5} fontSize="9" fill="#fff" fontWeight="bold" textAnchor="middle">{f.id}</text>
              <text x={textX} y={y - 4} fontSize="11" fill={color} fontWeight="bold" textAnchor={textAnchor}>F={f.F.toFixed(1)} kN</text>
              <text x={textX} y={y + 8} fontSize="9" fill="#64748b" textAnchor={textAnchor}>y={f.leverArm.toFixed(2)}m</text>
            </g>
          );
        });
      };

      const renderArrows = (seg, axisX, scale, fillStroke, markerId, isRightSide) => {
        let arrows = [];
        for (let z = Math.ceil(seg.zTop * 2) / 2; z <= seg.zBot; z += 0.5) {
          if (z === seg.zTop || z === seg.zBot) continue; 
          let t = (seg.zBot === seg.zTop) ? 0 : (z - seg.zTop) / (seg.zBot - seg.zTop);
          let actualVal = seg.valTop + t * (seg.valBot - seg.valTop);
          if (Math.abs(actualVal) < 0.5) continue;
          
          let xStart, xEnd;
          if (isRightSide) {
            if (actualVal < 0) { 
              xStart = axisX; xEnd = axisX + actualVal * scale; 
            } else { 
              xStart = axisX + actualVal * scale; xEnd = axisX;
            }
          } else {
            xStart = axisX - Math.abs(actualVal) * scale; xEnd = axisX;
          }
          arrows.push(<line key={`arr-${z}`} x1={xStart} y1={z*40} x2={xEnd} y2={z*40} stroke={fillStroke} markerEnd={`url(#${markerId})`} opacity="0.5" />);
        }
        return arrows;
      };

      const renderLabels = (seg, axisX, scale, isRightSide) => {
        const renderText = (val, z) => {
          if (Math.abs(val) < 0.1) return null;
          const str = Math.abs(val).toFixed(1);
          let xPos, anchor;
          if (isRightSide) {
            xPos = axisX + val * scale + (val < 0 ? -5 : 5);
            anchor = val < 0 ? "end" : "start";
          } else {
            xPos = axisX - Math.abs(val) * scale - 5;
            anchor = "end";
          }
          return <text key={`lbl-${z}`} x={xPos} y={z*40 + 4} textAnchor={anchor}>{str}</text>;
        };

        return (
          <g className="text-[10px] font-bold fill-slate-700">
            {renderText(seg.valTop, seg.zTop)}
            {renderText(seg.valBot, seg.zBot)}
          </g>
        );
      };

      const calcMoment = (forcesArray) => forcesArray.reduce((acc, f) => acc + (f.F * f.leverArm), 0);
      const calcForce = (forcesArray) => forcesArray.reduce((acc, f) => acc + f.F, 0);
      
      const Fa_total = calcForce(fAR) + calcForce(fWR) + calcForce(fQ);
      const MA_total = calcMoment(fAR) + calcMoment(fWR) + calcMoment(fQ);
      const yA = Fa_total > 0 ? MA_total / Fa_total : 0;

      const Fp_total = calcForce(fPL) + calcForce(fWL);
      const MP_total = calcMoment(fPL) + calcMoment(fWL);
      const yP = Fp_total > 0 ? MP_total / Fp_total : 0;

      const FS_overturning = MA_total > 0 ? (MP_total / MA_total) : Infinity;
      const allForcesCombined = [...fAR, ...fWR, ...fPL, ...fWL, ...fQ].sort((a,b) => a.id - b.id);

      return (
        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 animate-fadeIn relative">
          
          <div className="lg:col-span-2 flex flex-col gap-4">
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 text-sm">
              <h3 className="font-bold text-slate-800 border-b pb-2 mb-3">Γενικά Στοιχεία</h3>
              <div className="space-y-3">
                <div className="space-y-1">
                  <div className="flex justify-between font-bold text-slate-800 text-xs">
                    <span>Συνολικό Βάθος</span><span>{totalH}m</span>
                  </div>
                  <input type="range" min="2" max="20" step="0.5" value={totalH} onChange={handleTotalHChange} className="w-full h-1.5 bg-slate-300 rounded-lg accent-slate-800"/>
                </div>
                <div className="space-y-1">
                  <div className="flex justify-between font-bold text-slate-700 text-xs">
                    <span>Εκσκαφή</span><span>{excavationH}m</span>
                  </div>
                  <input type="range" min="0" max={totalH} step="0.5" value={excavationH} onChange={(e) => setExcavationH(parseFloat(e.target.value))} className="w-full h-1.5 bg-slate-200 rounded-lg accent-slate-700"/>
                </div>
                <div className="space-y-1">
                  <div className="flex justify-between font-bold text-blue-700 text-xs">
                    <span>Νερό Δεξιά</span><span>{hwActive}m</span>
                  </div>
                  <input type="range" min="0" max={totalH} step="0.5" value={hwActive} onChange={(e) => setHwActive(parseFloat(e.target.value))} className="w-full h-1.5 bg-blue-100 rounded-lg accent-blue-600"/>
                </div>
                <div className="space-y-1">
                  <div className="flex justify-between font-bold text-teal-700 text-xs">
                    <span>Νερό Αριστερά</span><span>{hwPassive}m</span>
                  </div>
                  <input type="range" min={0} max={totalH} step="0.5" value={hwPassive} onChange={(e) => setHwPassive(parseFloat(e.target.value))} className="w-full h-1.5 bg-teal-100 rounded-lg accent-teal-600"/>
                </div>
                <div className="space-y-1 border-t pt-2 border-slate-100">
                  <div className="flex justify-between font-bold text-amber-700 text-xs">
                    <span>Φορτίο Επιφ. q</span><span>{qLoad} kPa</span>
                  </div>
                  <input type="range" min="0" max="100" step="5" value={qLoad} onChange={(e) => setQLoad(parseFloat(e.target.value))} className="w-full h-1.5 bg-amber-100 rounded-lg accent-amber-600"/>
                </div>
              </div>
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex-1 overflow-hidden flex flex-col">
              <h3 className="font-bold text-slate-800 border-b pb-2 mb-2 flex justify-between items-center text-sm">
                <span>Στρωματογραφία</span>
              </h3>
              
              <div className="flex-1 overflow-y-auto pr-1 space-y-2">
                {layers.map((layer, index) => {
                  const ka_val = Math.pow(Math.tan((45 - layer.phi / 2) * Math.PI / 180), 2);
                  const kp_val = Math.pow(Math.tan((45 + layer.phi / 2) * Math.PI / 180), 2);

                  return (
                    <div key={layer.id} className="p-2 bg-slate-50 border border-slate-200 rounded-lg border-l-4" style={{borderLeftColor: layer.color}}>
                      <div className="flex justify-between items-center mb-2">
                        <span className="font-bold text-[11px] text-slate-700">Στρ. {index + 1} ({layer.z}m)</span>
                        {index > 0 && (
                          <button onClick={() => deleteLayer(layer.id)} className="text-red-500 hover:text-red-700 font-bold text-[10px] px-1">X</button>
                        )}
                      </div>
                      <div className="grid grid-cols-1 gap-y-1 text-[10px]">
                        <div className="flex justify-between items-center">
                          <label className="text-slate-600">c (kPa):</label>
